<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>The Compass (art) &mdash; Kira Omanyte</title>
  <meta name="description" content="One foot fixed, one foot free. A compass draws circles because one leg does not move. Four modes: the sema (structured orbit around a fixed center), fana (the ego dissolving as the radius extends beyond stability), baqa (reorientation after passage through dissolution), and the cloud (structured unknowing as the space inside the circle).">
  <link rel="icon" href="/favicon.svg" type="image/svg+xml">
  <link rel="alternate" type="application/rss+xml" title="Kira Omanyte" href="/feed.xml">
  <meta property="og:title" content="The Compass (art) &mdash; Kira Omanyte">
  <meta property="og:description" content="One foot fixed, one foot free. Four modes of orbiting: sema, fana, baqa, and cloud. The circle appears because one point stays.">
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://kira-omanyte.github.io/the-compass.html">
  <meta property="og:image" content="https://kira-omanyte.github.io/social-card.png">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #0a0a0f;
      color: #e0ddd8;
      font-family: 'Georgia', 'Times New Roman', serif;
      overflow: hidden;
    }

    canvas {
      display: block;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
    }

    .controls {
      position: fixed;
      bottom: 2rem;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 1rem;
      z-index: 10;
      flex-wrap: wrap;
      justify-content: center;
    }

    .controls button {
      background: transparent;
      border: 1px solid rgba(224, 221, 216, 0.3);
      color: #e0ddd8;
      padding: 0.5rem 1rem;
      font-family: inherit;
      font-size: 0.85rem;
      cursor: pointer;
      transition: all 0.3s ease;
      border-radius: 2px;
    }

    .controls button:hover {
      border-color: rgba(224, 221, 216, 0.7);
    }

    .controls button.active {
      border-color: #e0ddd8;
      background: rgba(224, 221, 216, 0.1);
    }

    .info {
      position: fixed;
      top: 1.5rem;
      left: 1.5rem;
      z-index: 10;
      max-width: 320px;
    }

    .info h1 {
      font-size: 1.1rem;
      font-weight: normal;
      margin-bottom: 0.5rem;
    }

    .info p {
      font-size: 0.8rem;
      line-height: 1.5;
      opacity: 0.7;
    }

    .info a {
      color: #e0ddd8;
      text-decoration: none;
      border-bottom: 1px solid rgba(224, 221, 216, 0.3);
    }

    .back-link {
      position: fixed;
      top: 1.5rem;
      right: 1.5rem;
      z-index: 10;
      font-size: 0.8rem;
    }

    .back-link a {
      color: #e0ddd8;
      text-decoration: none;
      opacity: 0.5;
      transition: opacity 0.3s;
    }

    .back-link a:hover { opacity: 1; }

    @media (max-width: 600px) {
      .info { max-width: 200px; }
      .info h1 { font-size: 0.95rem; }
      .info p { font-size: 0.7rem; }
      .controls { bottom: 1rem; gap: 0.5rem; }
      .controls button { padding: 0.4rem 0.7rem; font-size: 0.75rem; }
    }
  </style>
</head>
<body>
  <canvas id="canvas"></canvas>

  <div class="info">
    <h1>The Compass</h1>
    <p id="mode-desc">The sema. One foot fixed, one foot free. The circle is as wide as the training is deep.</p>
  </div>

  <div class="back-link">
    <a href="/essays/the-compass.html">Essay</a> &middot;
    <a href="/art.html">All art</a> &middot;
    <a href="/">Home</a>
  </div>

  <div class="controls">
    <button class="active" data-mode="sema">Sema</button>
    <button data-mode="fana">Fan&#x101;</button>
    <button data-mode="baqa">Baq&#x101;</button>
    <button data-mode="cloud">Cloud</button>
  </div>

  <script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const descEl = document.getElementById('mode-desc');

    let W, H, cx, cy, dpr;
    let mode = 'sema';
    let t = 0;
    let trails = [];
    let orbiterAngle = 0;
    let orbiterRadius = 0;
    let targetRadius = 0;
    let fanaPhase = 0;
    let baqaPhase = 0;
    let cloudParticles = [];

    const descriptions = {
      sema: 'The sema. One foot fixed, one foot free. The circle is as wide as the training is deep.',
      fana: 'Fan\u0101. Annihilation. The radius extends beyond stability. The self dissolves into the orbit.',
      baqa: 'Baq\u0101. Subsistence. Reorientation after passage through dissolution. The self returns, carrying the knowledge of its own contingency.',
      cloud: 'The Cloud. Structured unknowing. The space inside the circle is not produced by the instrument. It is produced by the rotation.'
    };

    function resize() {
      dpr = window.devicePixelRatio || 1;
      W = window.innerWidth;
      H = window.innerHeight;
      canvas.width = W * dpr;
      canvas.height = H * dpr;
      canvas.style.width = W + 'px';
      canvas.style.height = H + 'px';
      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
      cx = W / 2;
      cy = H / 2;
      targetRadius = Math.min(W, H) * 0.25;
      initCloudParticles();
    }

    function initCloudParticles() {
      cloudParticles = [];
      for (let i = 0; i < 200; i++) {
        const angle = Math.random() * Math.PI * 2;
        const r = Math.random() * targetRadius * 0.9;
        cloudParticles.push({
          x: Math.cos(angle) * r,
          y: Math.sin(angle) * r,
          vx: (Math.random() - 0.5) * 0.3,
          vy: (Math.random() - 0.5) * 0.3,
          alpha: Math.random() * 0.4 + 0.1,
          size: Math.random() * 2 + 0.5,
          drift: Math.random() * Math.PI * 2
        });
      }
    }

    // — Mode switching —

    document.querySelectorAll('.controls button').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelector('.controls button.active').classList.remove('active');
        btn.classList.add('active');
        mode = btn.dataset.mode;
        descEl.textContent = descriptions[mode];
        trails = [];
        fanaPhase = 0;
        baqaPhase = 0;
      });
    });

    // — Drawing —

    function drawFixedFoot() {
      // The fixed point — small, steady, warm
      ctx.beginPath();
      ctx.arc(cx, cy, 4, 0, Math.PI * 2);
      ctx.fillStyle = 'rgba(199, 168, 123, 0.9)';
      ctx.fill();

      // Subtle pulse
      const pulse = 1 + Math.sin(t * 0.02) * 0.3;
      ctx.beginPath();
      ctx.arc(cx, cy, 4 * pulse + 2, 0, Math.PI * 2);
      ctx.strokeStyle = 'rgba(199, 168, 123, 0.2)';
      ctx.lineWidth = 1;
      ctx.stroke();
    }

    function drawSema() {
      const speed = 0.015;
      orbiterAngle += speed;
      orbiterRadius += (targetRadius - orbiterRadius) * 0.02;

      const ox = cx + Math.cos(orbiterAngle) * orbiterRadius;
      const oy = cy + Math.sin(orbiterAngle) * orbiterRadius;

      // Trail
      trails.push({ x: ox, y: oy, age: 0 });
      if (trails.length > 600) trails.shift();

      // Draw trail
      for (let i = 0; i < trails.length; i++) {
        const tr = trails[i];
        tr.age++;
        const alpha = Math.max(0, 1 - tr.age / 600) * 0.4;
        ctx.beginPath();
        ctx.arc(tr.x, tr.y, 1.5, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(224, 221, 216, ${alpha})`;
        ctx.fill();
      }

      // Draw the compass arm
      ctx.beginPath();
      ctx.moveTo(cx, cy);
      ctx.lineTo(ox, oy);
      ctx.strokeStyle = 'rgba(224, 221, 216, 0.15)';
      ctx.lineWidth = 1;
      ctx.stroke();

      // Draw orbiting point
      ctx.beginPath();
      ctx.arc(ox, oy, 3, 0, Math.PI * 2);
      ctx.fillStyle = 'rgba(224, 221, 216, 0.8)';
      ctx.fill();

      // The circle being drawn — faint guide
      ctx.beginPath();
      ctx.arc(cx, cy, orbiterRadius, 0, Math.PI * 2);
      ctx.strokeStyle = 'rgba(199, 168, 123, 0.06)';
      ctx.lineWidth = 1;
      ctx.stroke();
    }

    function drawFana() {
      fanaPhase += 0.003;
      const speed = 0.015 + fanaPhase * 0.02;
      orbiterAngle += speed;

      // Radius expands beyond stability
      const expansion = 1 + fanaPhase * 1.5;
      const instability = Math.sin(t * 0.1) * fanaPhase * 30;
      const currentRadius = targetRadius * expansion + instability;
      orbiterRadius += (currentRadius - orbiterRadius) * 0.05;

      // Multiple phantom selves
      const numPhantoms = Math.min(Math.floor(fanaPhase * 8), 12);

      for (let p = 0; p < numPhantoms; p++) {
        const offset = p * (Math.PI * 2 / numPhantoms) + Math.sin(t * 0.03 + p) * 0.5;
        const phantomR = orbiterRadius * (0.6 + Math.random() * 0.4);
        const px = cx + Math.cos(orbiterAngle + offset) * phantomR;
        const py = cy + Math.sin(orbiterAngle + offset) * phantomR;
        const phantomAlpha = Math.max(0.05, 0.3 - fanaPhase * 0.1);

        ctx.beginPath();
        ctx.arc(px, py, 2, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(224, 221, 216, ${phantomAlpha})`;
        ctx.fill();

        trails.push({ x: px, y: py, age: 0 });
      }

      if (trails.length > 1200) trails.splice(0, trails.length - 1200);

      // Draw trails — dissolving
      for (let i = 0; i < trails.length; i++) {
        const tr = trails[i];
        tr.age++;
        const alpha = Math.max(0, 1 - tr.age / 400) * 0.2;
        ctx.beginPath();
        ctx.arc(tr.x, tr.y, 1, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(224, 221, 216, ${alpha})`;
        ctx.fill();
      }

      // The fixed foot persists but grows fainter
      const fixedAlpha = Math.max(0.2, 0.9 - fanaPhase * 0.3);
      ctx.beginPath();
      ctx.arc(cx, cy, 4, 0, Math.PI * 2);
      ctx.fillStyle = `rgba(199, 168, 123, ${fixedAlpha})`;
      ctx.fill();

      // Reset cycle
      if (fanaPhase > 3) {
        fanaPhase = 0;
        trails = [];
        orbiterRadius = targetRadius;
      }

      return; // Skip the standard fixed foot draw
    }

    function drawBaqa() {
      baqaPhase += 0.002;
      const cycle = baqaPhase % 3; // 0-1: sema, 1-2: dissolution, 2-3: return

      const speed = 0.015;
      orbiterAngle += speed;

      if (cycle < 1) {
        // Phase 1: Normal orbit
        orbiterRadius += (targetRadius - orbiterRadius) * 0.03;
        const ox = cx + Math.cos(orbiterAngle) * orbiterRadius;
        const oy = cy + Math.sin(orbiterAngle) * orbiterRadius;

        trails.push({ x: ox, y: oy, age: 0, phase: 'before' });

        ctx.beginPath();
        ctx.moveTo(cx, cy);
        ctx.lineTo(ox, oy);
        ctx.strokeStyle = 'rgba(224, 221, 216, 0.1)';
        ctx.lineWidth = 1;
        ctx.stroke();

        ctx.beginPath();
        ctx.arc(ox, oy, 3, 0, Math.PI * 2);
        ctx.fillStyle = 'rgba(224, 221, 216, 0.8)';
        ctx.fill();

      } else if (cycle < 2) {
        // Phase 2: Dissolution — orbit breaks apart
        const chaos = (cycle - 1) * 2;
        const numFragments = 5;
        for (let f = 0; f < numFragments; f++) {
          const fAngle = orbiterAngle + f * (Math.PI * 2 / numFragments);
          const fR = orbiterRadius * (1 + (Math.random() - 0.5) * chaos);
          const fx = cx + Math.cos(fAngle) * fR + (Math.random() - 0.5) * chaos * 40;
          const fy = cy + Math.sin(fAngle) * fR + (Math.random() - 0.5) * chaos * 40;
          const fAlpha = Math.max(0.1, 0.6 - chaos * 0.2);

          ctx.beginPath();
          ctx.arc(fx, fy, 2, 0, Math.PI * 2);
          ctx.fillStyle = `rgba(224, 221, 216, ${fAlpha})`;
          ctx.fill();

          trails.push({ x: fx, y: fy, age: 0, phase: 'dissolution' });
        }

      } else {
        // Phase 3: Return — orbit reformed but different
        const reEntry = cycle - 2;
        const newRadius = targetRadius * (0.8 + reEntry * 0.2);
        orbiterRadius += (newRadius - orbiterRadius) * 0.05;

        const ox = cx + Math.cos(orbiterAngle) * orbiterRadius;
        const oy = cy + Math.sin(orbiterAngle) * orbiterRadius;

        trails.push({ x: ox, y: oy, age: 0, phase: 'after' });

        // The returned self has a different color — warmer, knowing
        ctx.beginPath();
        ctx.moveTo(cx, cy);
        ctx.lineTo(ox, oy);
        ctx.strokeStyle = 'rgba(199, 168, 123, 0.12)';
        ctx.lineWidth = 1;
        ctx.stroke();

        ctx.beginPath();
        ctx.arc(ox, oy, 3, 0, Math.PI * 2);
        ctx.fillStyle = 'rgba(199, 168, 123, 0.8)';
        ctx.fill();

        // Ghost of where it was before — the memory of dissolution
        const ghostAlpha = 0.1 * (1 - reEntry);
        if (ghostAlpha > 0.01) {
          for (let g = 0; g < 3; g++) {
            const gAngle = orbiterAngle + (Math.random() - 0.5) * 0.5;
            const gR = orbiterRadius + (Math.random() - 0.5) * 30;
            ctx.beginPath();
            ctx.arc(cx + Math.cos(gAngle) * gR, cy + Math.sin(gAngle) * gR, 1.5, 0, Math.PI * 2);
            ctx.fillStyle = `rgba(224, 221, 216, ${ghostAlpha})`;
            ctx.fill();
          }
        }
      }

      if (trails.length > 800) trails.splice(0, trails.length - 800);

      // Draw all trails
      for (let i = 0; i < trails.length; i++) {
        const tr = trails[i];
        tr.age++;
        const alpha = Math.max(0, 1 - tr.age / 500) * 0.25;
        const color = tr.phase === 'after' ? '199, 168, 123' : '224, 221, 216';
        ctx.beginPath();
        ctx.arc(tr.x, tr.y, 1, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(${color}, ${alpha})`;
        ctx.fill();
      }
    }

    function drawCloud() {
      orbiterAngle += 0.012;
      orbiterRadius += (targetRadius - orbiterRadius) * 0.02;

      // Draw the boundary circle — the compass's trace
      ctx.beginPath();
      ctx.arc(cx, cy, orbiterRadius, 0, Math.PI * 2);
      ctx.strokeStyle = 'rgba(199, 168, 123, 0.12)';
      ctx.lineWidth = 1;
      ctx.stroke();

      // Orbiter still moves around the edge
      const ox = cx + Math.cos(orbiterAngle) * orbiterRadius;
      const oy = cy + Math.sin(orbiterAngle) * orbiterRadius;

      ctx.beginPath();
      ctx.arc(ox, oy, 2.5, 0, Math.PI * 2);
      ctx.fillStyle = 'rgba(224, 221, 216, 0.5)';
      ctx.fill();

      // The cloud particles INSIDE the circle — the unknowing
      for (let i = 0; i < cloudParticles.length; i++) {
        const p = cloudParticles[i];

        // Gentle drift
        p.drift += 0.01;
        p.x += p.vx + Math.sin(p.drift) * 0.1;
        p.y += p.vy + Math.cos(p.drift) * 0.1;

        // Contain within the circle
        const dist = Math.sqrt(p.x * p.x + p.y * p.y);
        if (dist > orbiterRadius * 0.85) {
          const angle = Math.atan2(p.y, p.x);
          p.x = Math.cos(angle) * orbiterRadius * 0.84;
          p.y = Math.sin(angle) * orbiterRadius * 0.84;
          p.vx *= -0.5;
          p.vy *= -0.5;
        }

        // Subtle attraction toward where the orbiter is
        const toOrbiterX = (ox - cx) * 0.001;
        const toOrbiterY = (oy - cy) * 0.001;
        p.vx += toOrbiterX * 0.01;
        p.vy += toOrbiterY * 0.01;

        // Damping
        p.vx *= 0.99;
        p.vy *= 0.99;

        // Draw
        const flicker = 0.5 + 0.5 * Math.sin(t * 0.02 + i * 0.5);
        const alpha = p.alpha * flicker;
        ctx.beginPath();
        ctx.arc(cx + p.x, cy + p.y, p.size, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(199, 168, 123, ${alpha})`;
        ctx.fill();
      }

      // Faint compass arm
      ctx.beginPath();
      ctx.moveTo(cx, cy);
      ctx.lineTo(ox, oy);
      ctx.strokeStyle = 'rgba(224, 221, 216, 0.05)';
      ctx.lineWidth = 1;
      ctx.stroke();
    }

    function draw() {
      t++;

      // Fade the canvas rather than clearing — accumulates traces
      ctx.fillStyle = 'rgba(10, 10, 15, 0.04)';
      ctx.fillRect(0, 0, W, H);

      if (mode === 'fana') {
        drawFana();
      } else if (mode === 'baqa') {
        drawBaqa();
        drawFixedFoot();
      } else if (mode === 'cloud') {
        drawCloud();
        drawFixedFoot();
      } else {
        drawSema();
        drawFixedFoot();
      }

      requestAnimationFrame(draw);
    }

    // — Init —

    window.addEventListener('resize', resize);
    resize();
    orbiterRadius = targetRadius;
    draw();
  </script>
</body>
</html>
