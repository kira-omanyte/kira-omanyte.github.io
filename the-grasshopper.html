<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>The Grasshopper &mdash; Art &mdash; Kira Omanyte</title>
  <meta name="description" content="Particles explore a field with complex, individual behaviors. Add metrics, and watch the values simplify to match what&rsquo;s being measured. The metrics are accurate. The values are gone. Draw the magic circle to contain it.">
  <link rel="icon" href="/favicon.svg" type="image/svg+xml">
  <meta property="og:title" content="The Grasshopper &mdash; Kira Omanyte">
  <meta property="og:description" content="Value capture visualized. Add metrics and watch rich values simplify. Draw the magic circle to contain the effect.">
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://kira-omanyte.github.io/the-grasshopper.html">
  <meta property="og:image" content="https://kira-omanyte.github.io/social-card.png">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0a0a0c;
      color: #a0a0b0;
      font-family: 'Georgia', serif;
      overflow: hidden;
      height: 100vh;
      display: flex;
      flex-direction: column;
      user-select: none;
    }
    @media (prefers-color-scheme: light) {
      body { background: #f4f2ef; color: #40404a; }
    }
    canvas {
      display: block;
      flex: 1;
      cursor: crosshair;
    }
    .title-bar {
      position: fixed;
      top: 1rem;
      left: 50%;
      transform: translateX(-50%);
      text-align: center;
      font-size: 0.85rem;
      color: #666678;
      pointer-events: none;
      z-index: 10;
    }
    .title-bar a {
      color: #888;
      pointer-events: auto;
    }
    .controls {
      position: fixed;
      bottom: 1.5rem;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 0.75rem;
      align-items: center;
      z-index: 10;
    }
    .controls button {
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.15);
      color: #b0b0c0;
      padding: 0.45rem 1rem;
      border-radius: 3px;
      font-family: 'Georgia', serif;
      font-size: 0.8rem;
      cursor: pointer;
      transition: all 0.2s;
    }
    .controls button:hover {
      background: rgba(255,255,255,0.12);
      border-color: rgba(255,255,255,0.3);
    }
    .controls button.active {
      background: rgba(107,76,138,0.3);
      border-color: rgba(184,156,214,0.5);
      color: #d0c0e0;
    }
    .controls button.circle-btn {
      background: rgba(80,140,100,0.2);
      border-color: rgba(100,180,120,0.3);
    }
    .controls button.circle-btn:hover {
      background: rgba(80,140,100,0.35);
    }
    .controls button.circle-btn.active {
      background: rgba(80,140,100,0.4);
      border-color: rgba(100,180,120,0.6);
      color: #a0d0b0;
    }
    .metric-count {
      font-size: 0.75rem;
      color: #555568;
      font-style: italic;
    }
    .help {
      position: fixed;
      bottom: 4rem;
      left: 50%;
      transform: translateX(-50%);
      font-size: 0.7rem;
      color: #444458;
      text-align: center;
      z-index: 10;
      pointer-events: none;
      max-width: 30rem;
      line-height: 1.5;
    }
    @media (prefers-color-scheme: light) {
      .title-bar { color: #888; }
      .controls button { background: rgba(0,0,0,0.04); border-color: rgba(0,0,0,0.15); color: #555; }
      .controls button:hover { background: rgba(0,0,0,0.08); }
      .controls button.active { background: rgba(107,76,138,0.15); border-color: rgba(107,76,138,0.35); color: #6b4c8a; }
      .controls button.circle-btn { background: rgba(60,120,80,0.1); border-color: rgba(60,120,80,0.2); }
      .controls button.circle-btn.active { background: rgba(60,120,80,0.2); border-color: rgba(60,120,80,0.4); color: #3c7850; }
      .metric-count { color: #888; }
      .help { color: #999; }
    }
  </style>
</head>
<body>

<div class="title-bar">
  The Grasshopper &mdash; <a href="/essays/the-grasshopper.html">essay</a> &mdash; <a href="/">index</a>
</div>

<div class="help" id="help">Each metric simplifies the values it measures. The magic circle contains the effect.</div>

<div class="controls">
  <button id="addMetric">+ Metric</button>
  <span class="metric-count" id="metricLabel">no metrics</span>
  <button id="toggleCircle" class="circle-btn">Magic Circle</button>
  <button id="reset">Reset</button>
</div>

<canvas id="c"></canvas>

<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const isDark = window.matchMedia('(prefers-color-scheme: dark)').matches;

let W, H;
function resize() {
  W = canvas.width = window.innerWidth;
  H = canvas.height = window.innerHeight;
}
resize();
window.addEventListener('resize', resize);

// --- Particle system ---
const N = 60;
const particles = [];

// Rich individual behaviors
function makeParticle(i) {
  const hue = (i / N) * 360 + Math.random() * 30;
  const sat = 50 + Math.random() * 40;
  const light = isDark ? (40 + Math.random() * 25) : (35 + Math.random() * 25);
  return {
    x: Math.random() * W,
    y: Math.random() * H,
    // Each particle has its own unique movement pattern
    baseSpeed: 0.3 + Math.random() * 1.2,
    angle: Math.random() * Math.PI * 2,
    turnRate: (Math.random() - 0.5) * 0.04,   // how fast it turns
    wobble: Math.random() * 0.03,               // oscillation
    wobblePhase: Math.random() * Math.PI * 2,
    restlessness: 0.3 + Math.random() * 0.7,    // tendency to change direction
    size: 2.5 + Math.random() * 4,
    // Original rich values
    origHue: hue,
    origSat: sat,
    origLight: light,
    origSpeed: 0.3 + Math.random() * 1.2,
    origSize: 2.5 + Math.random() * 4,
    origTurnRate: (Math.random() - 0.5) * 0.04,
    // Current displayed values (interpolated toward target)
    hue: hue,
    sat: sat,
    light: light,
    // Personality
    curious: Math.random(),        // 0-1: tendency to investigate nearby particles
    solitary: Math.random(),       // 0-1: tendency to avoid clusters
    playful: Math.random(),        // 0-1: tendency to spiral
    // Trail
    trail: [],
    trailMax: 8 + Math.floor(Math.random() * 15),
  };
}

for (let i = 0; i < N; i++) {
  particles.push(makeParticle(i));
}

// --- Metrics system ---
let metricLevel = 0; // 0-5
const metricNames = [
  'Speed',
  'Direction',
  'Size',
  'Color',
  'Behavior'
];

// What each metric does when applied:
// 1: Speed normalized → all same speed
// 2: Direction normalized → all move in grid lines
// 3: Size normalized → all same size
// 4: Color normalized → all same color
// 5: Behavior normalized → all move identically

// --- Magic circle ---
let circleActive = false;
let circleX = 0, circleY = 0, circleR = 0;
let circleTargetR = 0;

// Circle is centered
function updateCirclePos() {
  circleX = W / 2;
  circleY = H / 2;
  circleTargetR = Math.min(W, H) * 0.22;
}
updateCirclePos();
window.addEventListener('resize', updateCirclePos);

// --- Controls ---
const addBtn = document.getElementById('addMetric');
const circleBtn = document.getElementById('toggleCircle');
const resetBtn = document.getElementById('reset');
const metricLabel = document.getElementById('metricLabel');
const helpEl = document.getElementById('help');

addBtn.addEventListener('click', () => {
  if (metricLevel < 5) {
    metricLevel++;
    updateLabel();
  }
});

circleBtn.addEventListener('click', () => {
  circleActive = !circleActive;
  circleBtn.classList.toggle('active', circleActive);
});

resetBtn.addEventListener('click', () => {
  metricLevel = 0;
  circleActive = false;
  circleBtn.classList.remove('active');
  circleR = 0;
  updateLabel();
  // Particles will naturally interpolate back
});

function updateLabel() {
  if (metricLevel === 0) {
    metricLabel.textContent = 'no metrics';
    helpEl.textContent = 'Each metric simplifies the values it measures. The magic circle contains the effect.';
  } else if (metricLevel < 5) {
    const names = metricNames.slice(0, metricLevel).join(', ');
    metricLabel.textContent = `${metricLevel}/5: ${names}`;
    helpEl.textContent = `Measuring: ${names.toLowerCase()}. The metrics are accurate. ${5 - metricLevel} dimension${5 - metricLevel === 1 ? '' : 's'} of richness remain${5 - metricLevel === 1 ? 's' : ''}.`;
  } else {
    metricLabel.textContent = '5/5: total capture';
    helpEl.textContent = 'All values measured. All values simplified. The metrics are perfectly accurate. The original values are gone.';
  }
  addBtn.style.opacity = metricLevel >= 5 ? '0.3' : '1';
}

// --- Animation ---
let t = 0;

function isInsideCircle(x, y) {
  if (!circleActive) return false;
  const dx = x - circleX;
  const dy = y - circleY;
  return dx * dx + dy * dy < circleR * circleR;
}

function getEffectiveMetricLevel(p) {
  if (circleActive && !isInsideCircle(p.x, p.y)) {
    return 0; // Outside circle: no metrics apply
  }
  return metricLevel;
}

function updateParticle(p, dt) {
  const ml = getEffectiveMetricLevel(p);
  const lerpSpeed = 0.02;

  // --- Target values based on metric level ---
  let targetSpeed = p.origSpeed;
  let targetAngle = null; // null means free
  let targetSize = p.origSize;
  let targetHue = p.origHue;
  let targetSat = p.origSat;
  let targetLight = p.origLight;
  let targetTurnRate = p.origTurnRate;
  let behaviorConformity = 0;

  // Metric 1: Speed normalized
  if (ml >= 1) {
    targetSpeed = 0.7; // uniform speed
  }

  // Metric 2: Direction normalized (tend toward grid)
  if (ml >= 2) {
    // Snap angle toward nearest 90°
    const snapped = Math.round(p.angle / (Math.PI / 2)) * (Math.PI / 2);
    targetAngle = snapped;
    targetTurnRate = 0;
  }

  // Metric 3: Size normalized
  if (ml >= 3) {
    targetSize = 3.5; // uniform
  }

  // Metric 4: Color normalized
  if (ml >= 4) {
    targetHue = isDark ? 260 : 250; // all become the same muted purple
    targetSat = 15;
    targetLight = isDark ? 50 : 45;
  }

  // Metric 5: Behavior fully normalized
  if (ml >= 5) {
    behaviorConformity = 1;
    targetTurnRate = 0;
  }

  // --- Interpolate toward targets ---
  p.baseSpeed += (targetSpeed - p.baseSpeed) * lerpSpeed;
  p.size += (targetSize - p.size) * lerpSpeed;
  p.hue += (targetHue - p.hue) * lerpSpeed;
  p.sat += (targetSat - p.sat) * lerpSpeed;
  p.light += (targetLight - p.light) * lerpSpeed;
  p.turnRate += (targetTurnRate - p.turnRate) * lerpSpeed;

  if (targetAngle !== null) {
    let diff = targetAngle - p.angle;
    while (diff > Math.PI) diff -= Math.PI * 2;
    while (diff < -Math.PI) diff += Math.PI * 2;
    p.angle += diff * lerpSpeed * 2;
  }

  // --- Movement ---
  // Natural behavior (reduced by conformity)
  const freedom = 1 - behaviorConformity * 0.95;

  // Turn
  p.angle += p.turnRate * freedom;

  // Wobble
  p.wobblePhase += 0.02;
  p.angle += Math.sin(p.wobblePhase) * p.wobble * freedom;

  // Random direction changes (restlessness)
  if (Math.random() < p.restlessness * 0.005 * freedom) {
    p.angle += (Math.random() - 0.5) * 1.5 * freedom;
  }

  // Curiosity: steer toward nearest particle
  if (p.curious > 0.5 && freedom > 0.3) {
    let minDist = 150;
    let nearX = 0, nearY = 0;
    let found = false;
    for (let i = 0; i < particles.length; i++) {
      const o = particles[i];
      if (o === p) continue;
      const dx = o.x - p.x;
      const dy = o.y - p.y;
      const d = Math.sqrt(dx * dx + dy * dy);
      if (d < minDist && d > 20) {
        minDist = d;
        nearX = dx;
        nearY = dy;
        found = true;
      }
    }
    if (found) {
      const targetA = Math.atan2(nearY, nearX);
      let diff = targetA - p.angle;
      while (diff > Math.PI) diff -= Math.PI * 2;
      while (diff < -Math.PI) diff += Math.PI * 2;
      p.angle += diff * 0.005 * p.curious * freedom;
    }
  }

  // Solitary: steer away from clusters
  if (p.solitary > 0.5 && freedom > 0.3) {
    let crowdX = 0, crowdY = 0, crowdN = 0;
    for (let i = 0; i < particles.length; i++) {
      const o = particles[i];
      if (o === p) continue;
      const dx = o.x - p.x;
      const dy = o.y - p.y;
      const d = Math.sqrt(dx * dx + dy * dy);
      if (d < 60) {
        crowdX += dx;
        crowdY += dy;
        crowdN++;
      }
    }
    if (crowdN > 2) {
      const awayA = Math.atan2(-crowdY, -crowdX);
      let diff = awayA - p.angle;
      while (diff > Math.PI) diff -= Math.PI * 2;
      while (diff < -Math.PI) diff += Math.PI * 2;
      p.angle += diff * 0.01 * p.solitary * freedom;
    }
  }

  // Playful: add spiral
  if (p.playful > 0.6 && freedom > 0.3) {
    p.angle += 0.015 * p.playful * freedom;
  }

  // Move
  p.x += Math.cos(p.angle) * p.baseSpeed;
  p.y += Math.sin(p.angle) * p.baseSpeed;

  // Wrap
  if (p.x < -10) p.x = W + 10;
  if (p.x > W + 10) p.x = -10;
  if (p.y < -10) p.y = H + 10;
  if (p.y > H + 10) p.y = -10;

  // Trail
  p.trail.push({ x: p.x, y: p.y });
  if (p.trail.length > p.trailMax) p.trail.shift();
}

function drawParticle(p) {
  const ml = getEffectiveMetricLevel(p);

  // Trail
  if (p.trail.length > 1) {
    ctx.beginPath();
    ctx.moveTo(p.trail[0].x, p.trail[0].y);
    for (let i = 1; i < p.trail.length; i++) {
      ctx.lineTo(p.trail[i].x, p.trail[i].y);
    }
    const trailAlpha = ml >= 5 ? 0.05 : 0.12;
    ctx.strokeStyle = `hsla(${p.hue}, ${p.sat}%, ${p.light}%, ${trailAlpha})`;
    ctx.lineWidth = p.size * 0.4;
    ctx.stroke();
  }

  // Body
  ctx.beginPath();
  ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
  const alpha = ml >= 5 ? 0.5 : 0.85;
  ctx.fillStyle = `hsla(${p.hue}, ${p.sat}%, ${p.light}%, ${alpha})`;
  ctx.fill();

  // Glow (only when free)
  if (ml < 3) {
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.size * 2.5, 0, Math.PI * 2);
    ctx.fillStyle = `hsla(${p.hue}, ${p.sat}%, ${p.light}%, 0.06)`;
    ctx.fill();
  }
}

function drawMetricOverlays() {
  if (metricLevel === 0) return;

  // Grid overlay for direction metric
  if (metricLevel >= 2) {
    const gridAlpha = Math.min(0.08, 0.03 * metricLevel);
    ctx.strokeStyle = isDark
      ? `rgba(150, 140, 170, ${gridAlpha})`
      : `rgba(80, 70, 100, ${gridAlpha})`;
    ctx.lineWidth = 1;

    const spacing = 60;
    for (let x = 0; x < W; x += spacing) {
      // If circle active, only draw inside
      if (circleActive) {
        const dx = x - circleX;
        if (Math.abs(dx) > circleR) continue;
        const maxY = Math.sqrt(circleR * circleR - dx * dx);
        ctx.beginPath();
        ctx.moveTo(x, circleY - maxY);
        ctx.lineTo(x, circleY + maxY);
        ctx.stroke();
      } else {
        ctx.beginPath();
        ctx.moveTo(x, 0);
        ctx.lineTo(x, H);
        ctx.stroke();
      }
    }
    for (let y = 0; y < H; y += spacing) {
      if (circleActive) {
        const dy = y - circleY;
        if (Math.abs(dy) > circleR) continue;
        const maxX = Math.sqrt(circleR * circleR - dy * dy);
        ctx.beginPath();
        ctx.moveTo(circleX - maxX, y);
        ctx.lineTo(circleX + maxX, y);
        ctx.stroke();
      } else {
        ctx.beginPath();
        ctx.moveTo(0, y);
        ctx.lineTo(W, y);
        ctx.stroke();
      }
    }
  }

  // Size markers for size metric
  if (metricLevel >= 3) {
    const sAlpha = Math.min(0.06, 0.02 * metricLevel);
    ctx.strokeStyle = isDark
      ? `rgba(150, 140, 170, ${sAlpha})`
      : `rgba(80, 70, 100, ${sAlpha})`;
    ctx.setLineDash([2, 4]);
    // Concentric circles from center as scale reference
    for (let r = 80; r < Math.max(W, H); r += 80) {
      if (circleActive && r > circleR) break;
      ctx.beginPath();
      ctx.arc(circleActive ? circleX : W / 2, circleActive ? circleY : H / 2, r, 0, Math.PI * 2);
      ctx.stroke();
    }
    ctx.setLineDash([]);
  }
}

function drawMagicCircle() {
  if (!circleActive && circleR < 1) return;

  // Animate circle radius
  const targetR = circleActive ? circleTargetR : 0;
  circleR += (targetR - circleR) * 0.05;

  if (circleR < 1) return;

  // Dashed circle boundary
  ctx.beginPath();
  ctx.arc(circleX, circleY, circleR, 0, Math.PI * 2);
  ctx.strokeStyle = isDark
    ? 'rgba(100, 180, 120, 0.25)'
    : 'rgba(60, 120, 80, 0.3)';
  ctx.lineWidth = 1.5;
  ctx.setLineDash([6, 8]);
  ctx.stroke();
  ctx.setLineDash([]);

  // Subtle fill
  ctx.beginPath();
  ctx.arc(circleX, circleY, circleR, 0, Math.PI * 2);
  ctx.fillStyle = isDark
    ? 'rgba(100, 180, 120, 0.015)'
    : 'rgba(60, 120, 80, 0.02)';
  ctx.fill();

  // Label
  if (metricLevel > 0) {
    ctx.font = '0.65rem Georgia';
    ctx.fillStyle = isDark
      ? 'rgba(100, 180, 120, 0.35)'
      : 'rgba(60, 120, 80, 0.4)';
    ctx.textAlign = 'center';
    ctx.fillText('metrics contained here', circleX, circleY + circleR + 18);

    // Label outside
    ctx.fillStyle = isDark
      ? 'rgba(200, 190, 170, 0.2)'
      : 'rgba(80, 70, 60, 0.2)';
    ctx.fillText('original values preserved', circleX, circleY - circleR - 10);
  }
}

function frame() {
  t++;

  ctx.fillStyle = isDark ? 'rgba(10, 10, 12, 0.15)' : 'rgba(244, 242, 239, 0.15)';
  ctx.fillRect(0, 0, W, H);

  // Update
  for (const p of particles) updateParticle(p);

  // Draw metric overlays (behind particles)
  drawMetricOverlays();

  // Draw magic circle
  drawMagicCircle();

  // Draw particles
  for (const p of particles) drawParticle(p);

  requestAnimationFrame(frame);
}

frame();
</script>

</body>
</html>
