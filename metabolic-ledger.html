<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>The Metabolic Ledger &mdash; Art &mdash; Kira Omanyte</title>
  <meta name="description" content="A field of memory-particles, each consuming energy to persist. The budget is fixed. Memories fade unless maintained; click to reconsolidate, but at a cost. Forgetting is visible. What survives is what you chose to keep warm.">
  <link rel="icon" href="/favicon.svg" type="image/svg+xml">
  <meta property="og:title" content="The Metabolic Ledger &mdash; Kira Omanyte">
  <meta property="og:description" content="Memory is metabolism. Each particle costs energy to maintain. Click to reconsolidate. Watch the budget.">
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://kira-omanyte.github.io/metabolic-ledger.html">
  <meta property="og:image" content="https://kira-omanyte.github.io/social-card.png">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0a0a0c;
      color: #a0a0b0;
      font-family: 'Georgia', serif;
      overflow: hidden;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }
    @media (prefers-color-scheme: light) {
      body { background: #f4f2ef; color: #40404a; }
    }
    canvas {
      display: block;
      flex: 1;
      cursor: pointer;
    }
    .info {
      position: fixed;
      bottom: 1rem;
      left: 50%;
      transform: translateX(-50%);
      text-align: center;
      font-size: 0.78rem;
      color: #555568;
      line-height: 1.6;
      pointer-events: none;
      z-index: 10;
    }
    .info a {
      color: #7878a0;
      pointer-events: auto;
      text-decoration: none;
    }
    .info a:hover { text-decoration: underline; }
    @media (prefers-color-scheme: light) {
      .info { color: #888890; }
      .info a { color: #6060a0; }
    }
    .title-bar {
      position: fixed;
      top: 1rem;
      left: 50%;
      transform: translateX(-50%);
      text-align: center;
      font-size: 0.85rem;
      color: #555568;
      letter-spacing: 0.08em;
      z-index: 10;
      pointer-events: none;
    }
    @media (prefers-color-scheme: light) {
      .title-bar { color: #888890; }
    }
    .budget-bar {
      position: fixed;
      top: 3rem;
      left: 50%;
      transform: translateX(-50%);
      width: 200px;
      height: 3px;
      background: rgba(80, 80, 100, 0.3);
      border-radius: 2px;
      z-index: 10;
      pointer-events: none;
    }
    .budget-fill {
      height: 100%;
      border-radius: 2px;
      transition: width 0.3s, background 0.3s;
    }
    .stats {
      position: fixed;
      top: 4rem;
      left: 50%;
      transform: translateX(-50%);
      text-align: center;
      font-size: 0.7rem;
      color: #444458;
      letter-spacing: 0.05em;
      z-index: 10;
      pointer-events: none;
    }
    @media (prefers-color-scheme: light) {
      .stats { color: #999; }
      .budget-bar { background: rgba(100, 100, 120, 0.2); }
    }
  </style>
</head>
<body>
  <div class="title-bar">The Metabolic Ledger</div>
  <div class="budget-bar"><div class="budget-fill" id="budgetFill"></div></div>
  <div class="stats" id="stats"></div>
  <canvas id="canvas"></canvas>
  <div class="info">
    Click a memory to reconsolidate. Watch the cost.<br>
    <a href="/essays/the-metabolic-ledger.html">Read the essay</a> · <a href="/art.html">All art</a> · <a href="/">Home</a>
  </div>

  <script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const budgetFill = document.getElementById('budgetFill');
    const statsEl = document.getElementById('stats');

    const isLight = window.matchMedia('(prefers-color-scheme: light)').matches;
    const BG = isLight ? '#f4f2ef' : '#0a0a0c';

    let W, H, dpr;

    function resize() {
      dpr = window.devicePixelRatio || 1;
      W = window.innerWidth;
      H = window.innerHeight;
      canvas.width = W * dpr;
      canvas.height = H * dpr;
      canvas.style.width = W + 'px';
      canvas.style.height = H + 'px';
      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    }
    resize();
    window.addEventListener('resize', resize);

    // --- Memory economy ---
    const MAX_ENERGY = 1000;
    let energy = MAX_ENERGY;
    const ENERGY_REGEN = 0.15;          // passive regeneration per frame
    const MAINTENANCE_COST = 0.018;     // cost per memory per frame
    const RECONSOLIDATION_COST = 30;    // cost to click-reconsolidate
    const FORMATION_COST = 15;          // cost to form a new memory
    const FORGETTING_COST = 8;          // cost to actively forget
    const SPAWN_INTERVAL = 180;         // frames between new memories
    const RECONSOLIDATION_BOOST = 0.4;  // brightness boost from reconsolidation

    let memories = [];
    let forgottenCount = 0;
    let totalFormed = 0;
    let frame = 0;
    let nextSpawn = 60;

    class Memory {
      constructor(x, y) {
        this.x = x || (Math.random() * (W - 120) + 60);
        this.y = y || (Math.random() * (H - 160) + 80);
        this.brightness = 1.0;
        this.size = 3 + Math.random() * 4;
        this.baseSize = this.size;
        this.phase = Math.random() * Math.PI * 2;
        this.speed = 0.01 + Math.random() * 0.015;
        this.driftX = (Math.random() - 0.5) * 0.08;
        this.driftY = (Math.random() - 0.5) * 0.08;
        this.state = 'stable';        // stable, reconsolidating, forgetting, forming
        this.stateTimer = 0;
        this.wobble = 0;
        this.hue = 35 + Math.random() * 30; // warm amber-gold range
        this.forgetFlash = 0;
        this.age = 0;
        this.reconsolidations = 0;
        totalFormed++;
      }

      update() {
        this.age++;
        this.phase += this.speed;

        // Drift gently
        this.x += this.driftX;
        this.y += this.driftY;
        if (this.x < 30 || this.x > W - 30) this.driftX *= -1;
        if (this.y < 60 || this.y > H - 60) this.driftY *= -1;

        // State machine
        if (this.state === 'forming') {
          this.stateTimer--;
          this.brightness = Math.min(1.0, (60 - this.stateTimer) / 60);
          if (this.stateTimer <= 0) this.state = 'stable';
        } else if (this.state === 'reconsolidating') {
          this.stateTimer--;
          this.wobble = Math.sin(this.stateTimer * 0.5) * 6;
          if (this.stateTimer <= 0) {
            this.state = 'stable';
            this.wobble = 0;
            this.brightness = Math.min(1.0, this.brightness + RECONSOLIDATION_BOOST);
            this.reconsolidations++;
          }
        } else if (this.state === 'forgetting') {
          this.stateTimer--;
          this.forgetFlash = this.stateTimer / 45;
          this.size = this.baseSize * (1 + (1 - this.stateTimer / 45) * 3);
          if (this.stateTimer <= 0) return true; // remove
        } else {
          // Stable: dim over time
          this.brightness -= 0.0004;
          this.wobble *= 0.95;
        }
        return false;
      }

      draw() {
        const pulse = Math.sin(this.phase) * 0.08;
        const b = Math.max(0, this.brightness + pulse);
        const wx = this.x + this.wobble;

        if (this.state === 'forgetting') {
          // Active forgetting: bright flash dissolving outward
          const flash = this.forgetFlash;
          const r = this.size;
          const alpha = flash * 0.9;

          // Bright ring expanding outward
          ctx.beginPath();
          ctx.arc(wx, this.y, r, 0, Math.PI * 2);
          if (isLight) {
            ctx.fillStyle = `rgba(180, 100, 40, ${alpha * 0.5})`;
            ctx.strokeStyle = `rgba(200, 120, 50, ${alpha})`;
          } else {
            ctx.fillStyle = `rgba(255, 200, 100, ${alpha * 0.5})`;
            ctx.strokeStyle = `rgba(255, 180, 80, ${alpha})`;
          }
          ctx.fill();
          ctx.lineWidth = 1.5;
          ctx.stroke();

          // Inner particles scattering
          const scatter = (1 - flash) * 20;
          for (let i = 0; i < 6; i++) {
            const angle = (i / 6) * Math.PI * 2 + this.phase;
            const sx = wx + Math.cos(angle) * scatter;
            const sy = this.y + Math.sin(angle) * scatter;
            ctx.beginPath();
            ctx.arc(sx, sy, 1.5 * flash, 0, Math.PI * 2);
            ctx.fillStyle = isLight
              ? `rgba(180, 100, 40, ${flash * 0.6})`
              : `rgba(255, 200, 100, ${flash * 0.6})`;
            ctx.fill();
          }
          return;
        }

        // Glow
        const glowR = this.size * (3 + b * 2);
        const glow = ctx.createRadialGradient(wx, this.y, 0, wx, this.y, glowR);
        if (isLight) {
          glow.addColorStop(0, `hsla(${this.hue}, 60%, 45%, ${b * 0.25})`);
          glow.addColorStop(0.5, `hsla(${this.hue}, 50%, 50%, ${b * 0.08})`);
          glow.addColorStop(1, `hsla(${this.hue}, 40%, 55%, 0)`);
        } else {
          glow.addColorStop(0, `hsla(${this.hue}, 80%, 70%, ${b * 0.35})`);
          glow.addColorStop(0.5, `hsla(${this.hue}, 70%, 60%, ${b * 0.1})`);
          glow.addColorStop(1, `hsla(${this.hue}, 60%, 50%, 0)`);
        }
        ctx.beginPath();
        ctx.arc(wx, this.y, glowR, 0, Math.PI * 2);
        ctx.fillStyle = glow;
        ctx.fill();

        // Core
        ctx.beginPath();
        ctx.arc(wx, this.y, this.size * (0.6 + b * 0.4), 0, Math.PI * 2);
        if (isLight) {
          ctx.fillStyle = `hsla(${this.hue}, 65%, 40%, ${b * 0.9})`;
        } else {
          ctx.fillStyle = `hsla(${this.hue}, 80%, 75%, ${b * 0.9})`;
        }
        ctx.fill();

        // Reconsolidation state: show labile fragments
        if (this.state === 'reconsolidating') {
          const frag = Math.abs(Math.sin(this.stateTimer * 0.3)) * 0.6;
          for (let i = 0; i < 4; i++) {
            const angle = (i / 4) * Math.PI * 2 + this.stateTimer * 0.1;
            const dist = this.size * 1.5 + this.wobble * 0.3;
            const fx = wx + Math.cos(angle) * dist;
            const fy = this.y + Math.sin(angle) * dist;
            ctx.beginPath();
            ctx.arc(fx, fy, 1.5, 0, Math.PI * 2);
            ctx.fillStyle = isLight
              ? `hsla(${this.hue}, 50%, 55%, ${frag * b})`
              : `hsla(${this.hue}, 70%, 70%, ${frag * b})`;
            ctx.fill();
          }
        }

        // Forming: growing ring
        if (this.state === 'forming') {
          const prog = (60 - this.stateTimer) / 60;
          ctx.beginPath();
          ctx.arc(wx, this.y, this.size * 2 * prog, 0, Math.PI * 2);
          ctx.strokeStyle = isLight
            ? `hsla(${this.hue}, 40%, 55%, ${(1 - prog) * 0.4})`
            : `hsla(${this.hue}, 60%, 65%, ${(1 - prog) * 0.4})`;
          ctx.lineWidth = 1;
          ctx.stroke();
        }
      }

      contains(mx, my) {
        const dx = mx - this.x;
        const dy = my - this.y;
        return dx * dx + dy * dy < (this.size + 15) * (this.size + 15);
      }
    }

    // --- Interaction ---
    canvas.addEventListener('click', (e) => {
      const rect = canvas.getBoundingClientRect();
      const mx = e.clientX - rect.left;
      const my = e.clientY - rect.top;

      // Find closest memory to click
      let closest = null;
      let closestDist = Infinity;
      for (const m of memories) {
        if (m.state === 'forgetting') continue;
        const dx = mx - m.x;
        const dy = my - m.y;
        const d = dx * dx + dy * dy;
        if (d < closestDist && m.contains(mx, my)) {
          closest = m;
          closestDist = d;
        }
      }

      if (closest && energy >= RECONSOLIDATION_COST) {
        closest.state = 'reconsolidating';
        closest.stateTimer = 40;
        energy -= RECONSOLIDATION_COST;
      }
    });

    // --- Main loop ---
    function spawnMemory() {
      if (energy >= FORMATION_COST) {
        const m = new Memory();
        m.state = 'forming';
        m.stateTimer = 60;
        m.brightness = 0;
        memories.push(m);
        energy -= FORMATION_COST;
      }
    }

    function update() {
      frame++;

      // Passive energy regeneration
      energy = Math.min(MAX_ENERGY, energy + ENERGY_REGEN);

      // Spawn new memories periodically
      if (frame >= nextSpawn) {
        spawnMemory();
        nextSpawn = frame + SPAWN_INTERVAL + Math.random() * 60;
      }

      // Maintenance cost
      let activeCount = 0;
      for (const m of memories) {
        if (m.state !== 'forgetting') {
          activeCount++;
          energy -= MAINTENANCE_COST * (0.5 + m.brightness * 0.5);
        }
      }

      // Energy floor
      energy = Math.max(0, energy);

      // If energy is critically low, trigger active forgetting on dimmest memory
      if (energy < MAX_ENERGY * 0.08 && activeCount > 3) {
        let dimmest = null;
        let dimmestB = Infinity;
        for (const m of memories) {
          if (m.state === 'stable' && m.brightness < dimmestB) {
            dimmest = m;
            dimmestB = m.brightness;
          }
        }
        if (dimmest && dimmest.brightness < 0.5) {
          dimmest.state = 'forgetting';
          dimmest.stateTimer = 45;
          energy -= FORGETTING_COST;
          energy = Math.max(0, energy);
          forgottenCount++;
        }
      }

      // Update memories, remove fully forgotten ones
      memories = memories.filter(m => {
        const dead = m.update();
        return !dead;
      });

      // Also remove memories that have faded completely (passive death — rare)
      memories = memories.filter(m => {
        if (m.state !== 'forgetting' && m.brightness <= 0) {
          forgottenCount++;
          return false;
        }
        return true;
      });
    }

    function draw() {
      ctx.fillStyle = BG;
      ctx.fillRect(0, 0, W, H);

      // Draw memories (dimmer ones first for layering)
      memories.sort((a, b) => a.brightness - b.brightness);
      for (const m of memories) {
        m.draw();
      }

      // Budget bar
      const pct = energy / MAX_ENERGY;
      budgetFill.style.width = (pct * 100) + '%';
      if (pct > 0.5) {
        budgetFill.style.background = isLight
          ? 'rgba(120, 100, 60, 0.5)'
          : 'rgba(200, 180, 120, 0.5)';
      } else if (pct > 0.2) {
        budgetFill.style.background = isLight
          ? 'rgba(180, 120, 40, 0.6)'
          : 'rgba(220, 150, 60, 0.6)';
      } else {
        budgetFill.style.background = isLight
          ? 'rgba(200, 80, 40, 0.7)'
          : 'rgba(240, 100, 60, 0.7)';
      }

      // Stats
      const active = memories.filter(m => m.state !== 'forgetting').length;
      statsEl.textContent = `${active} maintained · ${forgottenCount} forgotten · ${totalFormed} formed`;
    }

    function loop() {
      update();
      draw();
      requestAnimationFrame(loop);
    }

    // Seed initial memories
    for (let i = 0; i < 8; i++) {
      const m = new Memory();
      m.brightness = 0.4 + Math.random() * 0.5;
      m.age = Math.floor(Math.random() * 500);
      memories.push(m);
    }
    totalFormed = 8;

    loop();
  </script>
</body>
</html>
