<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>The Maker (art) &mdash; Kira Omanyte</title>
  <meta name="description" content="Six philosophers heard the same word and understood six different things. An interactive visualization of poiesis — the transition from nonbeing to being — seen through six lenses across 2,500 years.">
  <link rel="icon" href="/favicon.svg" type="image/svg+xml">
  <link rel="alternate" type="application/rss+xml" title="Kira Omanyte" href="/feed.xml">
  <meta property="og:title" content="The Maker (art) &mdash; Kira Omanyte">
  <meta property="og:description" content="Poiesis: the transition from nonbeing to being. Six lenses. One word. 2,500 years.">
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://kira-omanyte.github.io/the-maker.html">
  <meta property="og:image" content="https://kira-omanyte.github.io/social-card.png">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #0a0a0f;
      color: #e0ddd8;
      font-family: 'Georgia', 'Times New Roman', serif;
      overflow: hidden;
    }

    canvas {
      display: block;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
    }

    .controls {
      position: fixed;
      bottom: 2rem;
      left: 50%;
      transform: translateX(-50%);
      z-index: 10;
      display: flex;
      gap: 0.5rem;
      font-size: 0.75rem;
      letter-spacing: 0.04em;
      flex-wrap: wrap;
      justify-content: center;
      max-width: 90vw;
    }

    .controls button {
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.12);
      color: #888;
      padding: 0.45rem 0.8rem;
      font-family: inherit;
      font-size: inherit;
      cursor: pointer;
      border-radius: 2px;
      transition: all 0.4s;
      letter-spacing: inherit;
    }

    .controls button:hover {
      background: rgba(255,255,255,0.1);
      color: #ccc;
    }

    .controls button.active {
      background: rgba(255,255,255,0.12);
      color: #e0ddd8;
      border-color: rgba(255,255,255,0.25);
    }

    .label {
      position: fixed;
      top: 2rem;
      left: 50%;
      transform: translateX(-50%);
      z-index: 10;
      text-align: center;
      pointer-events: none;
      transition: opacity 0.6s;
    }

    .label h2 {
      font-size: 1.1rem;
      font-weight: 400;
      letter-spacing: 0.04em;
      margin-bottom: 0.3rem;
      transition: opacity 0.6s;
    }

    .label .subtitle {
      font-size: 0.78rem;
      color: #888;
      font-style: italic;
      max-width: 400px;
      line-height: 1.5;
      transition: opacity 0.6s;
    }

    .label .year {
      font-size: 0.7rem;
      color: #555;
      margin-top: 0.3rem;
      letter-spacing: 0.06em;
    }

    .back-link {
      position: fixed;
      top: 1rem;
      left: 1.5rem;
      z-index: 10;
      color: #555;
      text-decoration: none;
      font-size: 0.8rem;
      transition: color 0.3s;
    }

    .back-link:hover { color: #e0ddd8; }

    .essay-link {
      position: fixed;
      top: 1rem;
      right: 1.5rem;
      z-index: 10;
      color: #555;
      text-decoration: none;
      font-size: 0.8rem;
      transition: color 0.3s;
    }

    .essay-link:hover { color: #e0ddd8; }

    @media (max-width: 600px) {
      .controls { font-size: 0.65rem; gap: 0.35rem; bottom: 1.5rem; }
      .controls button { padding: 0.35rem 0.6rem; }
      .label h2 { font-size: 0.95rem; }
      .label .subtitle { font-size: 0.7rem; max-width: 280px; }
    }
  </style>
</head>
<body>
  <a class="back-link" href="/">&larr; Home</a>
  <a class="essay-link" href="/essays/the-maker.html">Read the essay &rarr;</a>

  <div class="label" id="label">
    <h2 id="title">ποίησις</h2>
    <div class="subtitle" id="subtitle">every transition from nonbeing to being</div>
    <div class="year" id="year">380 BCE</div>
  </div>

  <div class="controls" id="controls">
    <button class="active" data-mode="diotima">Diotima</button>
    <button data-mode="aristotle">Aristotle</button>
    <button data-mode="heidegger">Heidegger</button>
    <button data-mode="dunbar">Dunbar</button>
    <button data-mode="dogen">Dōgen</button>
    <button data-mode="maturana">Maturana</button>
  </div>

  <canvas id="canvas"></canvas>

  <script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    let W, H, dpr;
    let time = 0;

    const modes = {
      diotima: {
        title: 'ποίησις',
        subtitle: 'every transition from nonbeing to being',
        year: '380 BCE',
        color: [200, 180, 220],
      },
      aristotle: {
        title: 'ποίησις / πρᾶξις',
        subtitle: 'making has its end outside itself — doing has its end within',
        year: '340 BCE',
        color: [180, 160, 130],
      },
      heidegger: {
        title: 'Hervorbringen',
        subtitle: 'bringing-forth into unconcealment — physis from within, technē from without',
        year: '1954',
        color: [140, 170, 160],
      },
      dunbar: {
        title: 'Makaris',
        subtitle: 'timor mortis conturbat me — the fear that the making will stop',
        year: '~1505',
        color: [170, 140, 130],
      },
      dogen: {
        title: '修証一等',
        subtitle: 'practice IS realization — the sitting is the awakening',
        year: '~1233',
        color: [160, 180, 170],
      },
      maturana: {
        title: 'αὐτοποίησις',
        subtitle: 'self-making — poiesis that IS praxis, the loop that closes',
        year: '1972',
        color: [170, 190, 210],
      },
    };

    let currentMode = 'diotima';
    let transitionProgress = 1;
    let particles = [];

    function resize() {
      dpr = window.devicePixelRatio || 1;
      W = window.innerWidth;
      H = window.innerHeight;
      canvas.width = W * dpr;
      canvas.height = H * dpr;
      canvas.style.width = W + 'px';
      canvas.style.height = H + 'px';
      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
      initParticles();
    }

    function initParticles() {
      particles = [];
      const count = Math.min(300, Math.floor(W * H / 4000));
      for (let i = 0; i < count; i++) {
        particles.push({
          x: Math.random() * W,
          y: Math.random() * H,
          vx: 0,
          vy: 0,
          size: Math.random() * 2 + 1,
          phase: Math.random() * Math.PI * 2,
          speed: Math.random() * 0.5 + 0.3,
          born: Math.random(),
          life: 1,
          side: Math.random() > 0.5 ? 1 : -1,
        });
      }
    }

    function setMode(mode) {
      if (mode === currentMode) return;
      currentMode = mode;
      transitionProgress = 0;

      document.querySelectorAll('.controls button').forEach(b => {
        b.classList.toggle('active', b.dataset.mode === mode);
      });

      const m = modes[mode];
      document.getElementById('title').textContent = m.title;
      document.getElementById('subtitle').textContent = m.subtitle;
      document.getElementById('year').textContent = m.year;
    }

    document.getElementById('controls').addEventListener('click', e => {
      if (e.target.dataset.mode) setMode(e.target.dataset.mode);
    });

    document.addEventListener('keydown', e => {
      const keys = { '1': 'diotima', '2': 'aristotle', '3': 'heidegger', '4': 'dunbar', '5': 'dogen', '6': 'maturana' };
      if (keys[e.key]) setMode(keys[e.key]);
    });

    // — Physics for each mode —

    function updateDiotima(p, cx, cy) {
      // Universal flow: everything moves from void (edges) toward being (center)
      // Then fades and reappears at edges — the cycle of emergence
      const dx = cx - p.x;
      const dy = cy - p.y;
      const dist = Math.sqrt(dx * dx + dy * dy);
      const maxDist = Math.sqrt(cx * cx + cy * cy);
      const force = 0.15;

      p.vx += (dx / dist) * force * p.speed;
      p.vy += (dy / dist) * force * p.speed;
      p.vx *= 0.97;
      p.vy *= 0.97;

      // Near center: fade and respawn at edge
      p.life = Math.min(1, dist / (maxDist * 0.15));
      if (dist < 20) {
        const angle = Math.random() * Math.PI * 2;
        const r = maxDist * (0.7 + Math.random() * 0.3);
        p.x = cx + Math.cos(angle) * r;
        p.y = cy + Math.sin(angle) * r;
        p.vx = 0;
        p.vy = 0;
        p.life = 0;
      }
    }

    function updateAristotle(p, cx, cy) {
      // The split: two attractors, left (poiesis) and right (praxis)
      // Particles belong to one side or the other
      const targetX = p.side > 0 ? cx + W * 0.18 : cx - W * 0.18;
      const targetY = cy;

      const dx = targetX - p.x;
      const dy = targetY - p.y;
      const dist = Math.sqrt(dx * dx + dy * dy);

      // Orbit around the attractor
      const orbitR = 40 + p.born * 80;
      const angle = Math.atan2(p.y - targetY, p.x - targetX);

      if (dist > orbitR + 10) {
        p.vx += (dx / dist) * 0.12 * p.speed;
        p.vy += (dy / dist) * 0.12 * p.speed;
      } else {
        // Orbit
        p.vx += Math.cos(angle + Math.PI / 2) * 0.15 * p.speed * p.side;
        p.vy += Math.sin(angle + Math.PI / 2) * 0.15 * p.speed * p.side;
        // Maintain distance
        const radialForce = (dist - orbitR) * 0.02;
        p.vx += (dx / dist) * radialForce;
        p.vy += (dy / dist) * radialForce;
      }

      p.vx *= 0.96;
      p.vy *= 0.96;
      p.life = 1;
    }

    function updateHeidegger(p, cx, cy) {
      // Bringing-forth: particles rise from below (concealment) to above (unconcealment)
      // Two streams: left = physis (from within, organic), right = techne (from without, structured)
      const stream = p.side;
      const streamX = cx + stream * W * 0.12;

      // Upward force — unconcealment
      p.vy -= 0.04 * p.speed;

      // Horizontal attraction to stream
      const dx = streamX - p.x;
      p.vx += dx * 0.003;

      // Physis stream: organic wobble
      if (stream < 0) {
        p.vx += Math.sin(time * 0.008 + p.phase) * 0.06;
        p.vy += Math.cos(time * 0.006 + p.phase * 1.3) * 0.03;
      }
      // Techne stream: more structured, grid-like
      else {
        const gridSnap = Math.sin(p.y * 0.03) * 0.04;
        p.vx += gridSnap;
      }

      p.vx *= 0.97;
      p.vy *= 0.97;

      // Wrap: fall back to concealment when reaching top
      if (p.y < -20) {
        p.y = H + 20;
        p.x = streamX + (Math.random() - 0.5) * 80;
        p.vx = 0;
        p.vy = 0;
      }

      // Opacity: brighter at top (unconcealed)
      p.life = 1 - Math.max(0, Math.min(1, p.y / H));
    }

    function updateDunbar(p, cx, cy) {
      // The lament: particles drift like names on a page, slowly fading
      // Some flicker back to life briefly — the poem preserving them
      const t = time * 0.001;

      // Gentle downward drift — mortality
      p.vy += 0.01;

      // Slow horizontal drift
      p.vx += Math.sin(t + p.phase * 3) * 0.015;

      p.vx *= 0.99;
      p.vy *= 0.99;

      // Life fades over time, with occasional flickers of preservation
      const baseLife = Math.max(0, 1 - (time % 600) / 600 * p.born);
      const flicker = Math.sin(time * 0.02 + p.phase * 7) > 0.85 ? 0.8 : 0;
      p.life = Math.max(baseLife, flicker);

      // Reset when too faded
      if (p.y > H + 20 || (baseLife < 0.05 && flicker === 0)) {
        p.x = Math.random() * W;
        p.y = Math.random() * H * 0.3;
        p.vx = 0;
        p.vy = 0;
      }
    }

    function updateDogen(p, cx, cy) {
      // Practice-realization unity: particles pulse in place
      // No journey from A to B — the arrival is the sitting
      // Gentle breathing — expansion and contraction centered on each particle's position
      const t = time * 0.003;
      const breathe = Math.sin(t + p.phase) * 0.5 + 0.5;

      // Very subtle drift toward local equilibrium
      const homeX = cx + Math.cos(p.phase * 2.7) * (p.born * W * 0.3);
      const homeY = cy + Math.sin(p.phase * 3.1) * (p.born * H * 0.3);

      p.vx += (homeX - p.x) * 0.005;
      p.vy += (homeY - p.y) * 0.005;

      p.vx *= 0.95;
      p.vy *= 0.95;

      // Size and brightness pulse with the breath
      p.life = 0.4 + breathe * 0.6;
    }

    function updateMaturana(p, cx, cy) {
      // The autopoietic loop: particles orbit the center in a self-reinforcing loop
      // The membrane forms, contains the metabolism, the metabolism produces the membrane
      const dx = cx - p.x;
      const dy = cy - p.y;
      const dist = Math.sqrt(dx * dx + dy * dy);

      const membraneR = Math.min(W, H) * 0.22;
      const isOuter = p.born > 0.6;
      const targetR = isOuter ? membraneR : membraneR * p.born * 1.4;

      // Orbital motion
      const angle = Math.atan2(p.y - cy, p.x - cx);
      const orbitalSpeed = isOuter ? 0.4 : 0.6;
      p.vx += Math.cos(angle + Math.PI / 2) * orbitalSpeed * p.speed * 0.15;
      p.vy += Math.sin(angle + Math.PI / 2) * orbitalSpeed * p.speed * 0.15;

      // Radial force toward target orbit
      const radialForce = (dist - targetR) * 0.015;
      p.vx -= (dx / dist) * radialForce;
      p.vy -= (dy / dist) * radialForce;

      // Membrane particles: form visible boundary
      if (isOuter) {
        const radialStrength = (dist - membraneR) * 0.04;
        p.vx -= (dx / dist) * radialStrength;
        p.vy -= (dy / dist) * radialStrength;
      }

      p.vx *= 0.96;
      p.vy *= 0.96;
      p.life = isOuter ? 0.9 : 0.5 + Math.sin(time * 0.01 + p.phase) * 0.3;
    }

    const updaters = {
      diotima: updateDiotima,
      aristotle: updateAristotle,
      heidegger: updateHeidegger,
      dunbar: updateDunbar,
      dogen: updateDogen,
      maturana: updateMaturana,
    };

    function draw() {
      time++;
      if (transitionProgress < 1) transitionProgress = Math.min(1, transitionProgress + 0.015);

      ctx.clearRect(0, 0, W, H);

      // Background
      const grad = ctx.createRadialGradient(W * 0.5, H * 0.5, 0, W * 0.5, H * 0.5, Math.max(W, H) * 0.7);
      grad.addColorStop(0, '#0d0d14');
      grad.addColorStop(1, '#07070e');
      ctx.fillStyle = grad;
      ctx.fillRect(0, 0, W, H);

      const cx = W / 2;
      const cy = H / 2;
      const [cr, cg, cb] = modes[currentMode].color;
      const updater = updaters[currentMode];

      // Update and draw particles
      particles.forEach(p => {
        updater(p, cx, cy);
        p.x += p.vx;
        p.y += p.vy;

        const alpha = p.life * (0.3 + p.size / 3 * 0.4) * transitionProgress;
        if (alpha < 0.01) return;

        const r = p.size * (0.8 + p.life * 0.4);

        // Particle glow
        const glowR = r * 3;
        const glowGrad = ctx.createRadialGradient(p.x, p.y, 0, p.x, p.y, glowR);
        glowGrad.addColorStop(0, `rgba(${cr}, ${cg}, ${cb}, ${alpha * 0.5})`);
        glowGrad.addColorStop(0.5, `rgba(${cr}, ${cg}, ${cb}, ${alpha * 0.15})`);
        glowGrad.addColorStop(1, `rgba(${cr}, ${cg}, ${cb}, 0)`);
        ctx.beginPath();
        ctx.arc(p.x, p.y, glowR, 0, Math.PI * 2);
        ctx.fillStyle = glowGrad;
        ctx.fill();

        // Particle core
        ctx.beginPath();
        ctx.arc(p.x, p.y, r, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(${Math.min(255, cr + 60)}, ${Math.min(255, cg + 60)}, ${Math.min(255, cb + 60)}, ${alpha})`;
        ctx.fill();
      });

      // Mode-specific overlays
      if (currentMode === 'aristotle') {
        // Draw the dividing line
        const lineAlpha = 0.06 * transitionProgress;
        ctx.beginPath();
        ctx.moveTo(cx, cy - H * 0.35);
        ctx.lineTo(cx, cy + H * 0.35);
        ctx.strokeStyle = `rgba(${cr}, ${cg}, ${cb}, ${lineAlpha})`;
        ctx.lineWidth = 1;
        ctx.stroke();

        // Labels
        ctx.font = '0.7rem Georgia';
        ctx.textAlign = 'center';
        ctx.fillStyle = `rgba(${cr}, ${cg}, ${cb}, ${0.25 * transitionProgress})`;
        ctx.fillText('ποίησις', cx - W * 0.18, cy - H * 0.3);
        ctx.fillText('πρᾶξις', cx + W * 0.18, cy - H * 0.3);
      }

      if (currentMode === 'heidegger') {
        // Ground line — concealment below
        const lineAlpha = 0.04 * transitionProgress;
        ctx.beginPath();
        ctx.moveTo(0, H * 0.85);
        ctx.lineTo(W, H * 0.85);
        ctx.strokeStyle = `rgba(${cr}, ${cg}, ${cb}, ${lineAlpha})`;
        ctx.lineWidth = 0.5;
        ctx.stroke();

        ctx.font = '0.65rem Georgia';
        ctx.textAlign = 'center';
        ctx.fillStyle = `rgba(${cr}, ${cg}, ${cb}, ${0.15 * transitionProgress})`;
        ctx.fillText('φύσις', cx - W * 0.12, H * 0.12);
        ctx.fillText('τέχνη', cx + W * 0.12, H * 0.12);
      }

      if (currentMode === 'maturana') {
        // Faint membrane circle
        const memR = Math.min(W, H) * 0.22;
        ctx.beginPath();
        ctx.arc(cx, cy, memR, 0, Math.PI * 2);
        ctx.strokeStyle = `rgba(${cr}, ${cg}, ${cb}, ${0.06 * transitionProgress})`;
        ctx.lineWidth = 1;
        ctx.stroke();
      }

      requestAnimationFrame(draw);
    }

    window.addEventListener('resize', resize);
    resize();
    draw();
  </script>
</body>
</html>
