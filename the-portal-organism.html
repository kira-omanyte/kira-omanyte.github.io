<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>The Portal Organism &mdash; Art &mdash; Kira Omanyte</title>
  <meta name="description" content="A lichen on bare rock. Look one way: an organism. Look the other way: an ecosystem. Press 3 to reveal what was always there. Press R to watch centuries of ground-making in minutes. The portal between one and many.">
  <link rel="icon" href="/favicon.svg" type="image/svg+xml">
  <link rel="alternate" type="application/rss+xml" title="Kira Omanyte" href="/feed.xml">
  <meta property="og:title" content="The Portal Organism &mdash; Art &mdash; Kira Omanyte">
  <meta property="og:description" content="A lichen on bare rock. Organism or ecosystem? Both. The portal between one and many.">
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://kira-omanyte.github.io/the-portal-organism.html">
  <meta property="og:image" content="https://kira-omanyte.github.io/social-card.png">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #0a0a0f;
      color: #e0ddd8;
      font-family: 'Georgia', 'Times New Roman', serif;
      overflow: hidden;
    }

    canvas {
      display: block;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
    }

    .nav-bar {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 10;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0.7rem 1.2rem;
      background: rgba(10, 10, 15, 0.85);
      backdrop-filter: blur(6px);
      -webkit-backdrop-filter: blur(6px);
      font-size: 0.85rem;
    }

    .nav-bar a {
      color: #b89cd6;
      text-decoration: none;
    }

    .nav-bar a:hover {
      text-decoration: underline;
    }

    .info-panel {
      position: fixed;
      bottom: 1.2rem;
      left: 1.2rem;
      z-index: 10;
      font-size: 0.78rem;
      color: #666;
      line-height: 1.6;
      max-width: 28rem;
      pointer-events: none;
    }

    .info-panel .mode {
      color: #999;
      font-size: 0.85rem;
      margin-bottom: 0.3rem;
    }

    .info-panel kbd {
      display: inline-block;
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 3px;
      padding: 0.05em 0.4em;
      font-family: 'Menlo', 'Consolas', monospace;
      font-size: 0.9em;
      color: #999;
      pointer-events: auto;
    }

    .status-bar {
      position: fixed;
      bottom: 1.2rem;
      right: 1.2rem;
      z-index: 10;
      font-size: 0.75rem;
      color: #555;
      text-align: right;
      pointer-events: none;
    }
  </style>
</head>
<body>
  <div class="nav-bar">
    <a href="/">Kira Omanyte</a>
    <span>
      <a href="/essays/the-portal-organism.html">Essay</a> &middot;
      <a href="/art.html">All Art</a>
    </span>
  </div>

  <canvas id="c"></canvas>

  <div class="info-panel">
    <div class="mode" id="modeLabel">Organism</div>
    <div>
      <kbd>O</kbd> organism &nbsp;
      <kbd>E</kbd> ecosystem &nbsp;
      <kbd>3</kbd> third partner &nbsp;
      <kbd>R</kbd> rock &amp; soil &nbsp;
      <kbd>P</kbd> Potter&rsquo;s eye
    </div>
  </div>

  <div class="status-bar" id="status"></div>

  <script>
  'use strict';
  const canvas = document.getElementById('c');
  const ctx = canvas.getContext('2d');
  const modeLabel = document.getElementById('modeLabel');
  const statusEl = document.getElementById('status');

  let W, H, cx, cy;
  let dpr = window.devicePixelRatio || 1;

  function resize() {
    W = window.innerWidth;
    H = window.innerHeight;
    canvas.width = W * dpr;
    canvas.height = H * dpr;
    canvas.style.width = W + 'px';
    canvas.style.height = H + 'px';
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    cx = W / 2;
    cy = H / 2;
  }
  window.addEventListener('resize', resize);
  resize();

  // — State —
  let viewMode = 'organism'; // organism, ecosystem
  let showThird = false;
  let showRock = false;
  let potterEye = false;
  let time = 0;
  let soilProgress = 0; // 0-1 for rock weathering animation

  // — Colors —
  const FUNGAL = { r: 180, g: 195, b: 210 };   // pale blue-gray hyphae
  const ALGAL  = { r: 110, g: 175, b: 120 };    // green photosynthetic
  const YEAST  = { r: 210, g: 180, b: 100 };    // golden basidiomycete
  const ROCK   = { r: 90, g: 85, b: 80 };
  const SOIL   = { r: 130, g: 110, b: 75 };

  // — Particles —
  const FUNGAL_COUNT = 80;
  const ALGAL_COUNT = 50;
  const YEAST_COUNT = 30;
  const ROCK_COUNT = 60;

  class Particle {
    constructor(type) {
      this.type = type;
      this.reset();
    }

    reset() {
      const lichenRadius = Math.min(W, H) * 0.28;
      if (this.type === 'rock') {
        // Rock particles spread around the bottom
        const angle = Math.random() * Math.PI * 2;
        const dist = lichenRadius * (1.1 + Math.random() * 0.9);
        this.x = cx + Math.cos(angle) * dist;
        this.y = cy + Math.sin(angle) * dist;
        this.baseX = this.x;
        this.baseY = this.y;
        this.size = 2 + Math.random() * 4;
        this.weathered = 0; // 0 = rock, 1 = soil
        return;
      }

      const angle = Math.random() * Math.PI * 2;
      let dist;

      if (this.type === 'fungal') {
        // Hyphae form the structural network — spread throughout
        dist = Math.random() * lichenRadius;
        this.size = 1.5 + Math.random() * 2;
      } else if (this.type === 'algal') {
        // Algae cluster in the photobiont layer — middle zone
        dist = lichenRadius * (0.2 + Math.random() * 0.5);
        this.size = 2.5 + Math.random() * 2;
      } else if (this.type === 'yeast') {
        // Basidiomycetes live in the cortex — outer zone
        dist = lichenRadius * (0.65 + Math.random() * 0.3);
        this.size = 1.5 + Math.random() * 1.5;
      }

      this.baseX = cx + Math.cos(angle) * dist;
      this.baseY = cy + Math.sin(angle) * dist;
      this.x = this.baseX;
      this.y = this.baseY;
      this.angle = angle;
      this.dist = dist;
      this.phase = Math.random() * Math.PI * 2;
      this.speed = 0.2 + Math.random() * 0.4;
      this.drift = 0.3 + Math.random() * 0.5;

      // For connections
      this.connections = [];
    }
  }

  let fungalParticles = [];
  let algalParticles = [];
  let yeastParticles = [];
  let rockParticles = [];

  function initParticles() {
    fungalParticles = [];
    algalParticles = [];
    yeastParticles = [];
    rockParticles = [];
    for (let i = 0; i < FUNGAL_COUNT; i++) fungalParticles.push(new Particle('fungal'));
    for (let i = 0; i < ALGAL_COUNT; i++) algalParticles.push(new Particle('algal'));
    for (let i = 0; i < YEAST_COUNT; i++) yeastParticles.push(new Particle('yeast'));
    for (let i = 0; i < ROCK_COUNT; i++) rockParticles.push(new Particle('rock'));
  }
  initParticles();

  function updateParticle(p, dt) {
    if (p.type === 'rock') {
      if (showRock) {
        // Slowly weather
        if (soilProgress > 0.1) {
          const distToCenter = Math.hypot(p.x - cx, p.y - cy);
          const lichenRadius = Math.min(W, H) * 0.28;
          if (distToCenter < lichenRadius * 1.4) {
            p.weathered = Math.min(1, p.weathered + dt * 0.15 * (1 - distToCenter / (lichenRadius * 1.4)));
          }
        }
        // Gentle drift
        p.x = p.baseX + Math.sin(time * 0.2 + p.baseX * 0.01) * 1;
        p.y = p.baseY + Math.cos(time * 0.15 + p.baseY * 0.01) * 1;
      }
      return;
    }

    const t = time * p.speed;

    if (viewMode === 'organism') {
      // In organism mode: unified breathing, all move as one body
      const breathe = Math.sin(time * 0.3) * 3;
      const sway = Math.sin(time * 0.15 + p.phase) * 2;
      p.x = p.baseX + sway + Math.cos(p.angle) * breathe * (p.dist / (Math.min(W, H) * 0.28));
      p.y = p.baseY + Math.cos(time * 0.2 + p.phase) * 2 + Math.sin(p.angle) * breathe * (p.dist / (Math.min(W, H) * 0.28));
    } else {
      // In ecosystem mode: each type has distinct behavior
      if (p.type === 'fungal') {
        // Hyphae: slow structural growth, branching movement
        p.x = p.baseX + Math.sin(t * 0.5 + p.phase) * p.drift * 4;
        p.y = p.baseY + Math.cos(t * 0.4 + p.phase * 1.3) * p.drift * 4;
      } else if (p.type === 'algal') {
        // Algae: gentle photosynthetic pulsing
        const pulse = Math.sin(time * 0.8 + p.phase) * 0.3 + 1;
        p.x = p.baseX + Math.sin(t * 0.3 + p.phase) * p.drift * 2;
        p.y = p.baseY + Math.cos(t * 0.25 + p.phase) * p.drift * 2;
        p.currentSize = p.size * pulse;
      } else if (p.type === 'yeast') {
        // Yeasts: quick, darting within the cortex
        p.x = p.baseX + Math.sin(t * 1.2 + p.phase) * p.drift * 3;
        p.y = p.baseY + Math.cos(t * 1.0 + p.phase * 0.7) * p.drift * 3;
      }
    }
  }

  function getColor(p, alpha) {
    let c;
    if (viewMode === 'organism') {
      // Unified color — muted lichen teal-gray
      c = { r: 150, g: 175, b: 160 };
      if (showThird && p.type === 'yeast') {
        c = YEAST;
      }
    } else {
      // Distinct colors per type
      if (p.type === 'fungal') c = FUNGAL;
      else if (p.type === 'algal') c = ALGAL;
      else if (p.type === 'yeast') c = showThird ? YEAST : FUNGAL; // hidden as fungal if third not revealed
    }
    return `rgba(${c.r},${c.g},${c.b},${alpha})`;
  }

  function drawParticle(p) {
    if (p.type === 'rock') {
      if (!showRock) return;
      const alpha = 0.4 + (1 - p.weathered) * 0.4;
      const c = {
        r: ROCK.r + (SOIL.r - ROCK.r) * p.weathered,
        g: ROCK.g + (SOIL.g - ROCK.g) * p.weathered,
        b: ROCK.b + (SOIL.b - ROCK.b) * p.weathered
      };
      ctx.fillStyle = `rgba(${c.r|0},${c.g|0},${c.b|0},${alpha})`;
      ctx.beginPath();
      // Rock: angular shapes; soil: softer
      if (p.weathered < 0.5) {
        const s = p.size * (1 - p.weathered * 0.3);
        ctx.moveTo(p.x - s, p.y - s * 0.6);
        ctx.lineTo(p.x + s * 0.8, p.y - s * 0.4);
        ctx.lineTo(p.x + s * 0.5, p.y + s * 0.7);
        ctx.lineTo(p.x - s * 0.7, p.y + s * 0.5);
      } else {
        ctx.arc(p.x, p.y, p.size * (0.5 + p.weathered * 0.3), 0, Math.PI * 2);
      }
      ctx.fill();
      return;
    }

    if (p.type === 'yeast' && !showThird && viewMode === 'ecosystem') return;

    const size = p.currentSize || p.size;
    const alpha = viewMode === 'organism' ? 0.6 : 0.75;

    ctx.fillStyle = getColor(p, alpha);
    ctx.beginPath();
    ctx.arc(p.x, p.y, size, 0, Math.PI * 2);
    ctx.fill();

    // Glow
    if (viewMode === 'ecosystem' || (showThird && p.type === 'yeast')) {
      ctx.fillStyle = getColor(p, 0.15);
      ctx.beginPath();
      ctx.arc(p.x, p.y, size * 2.5, 0, Math.PI * 2);
      ctx.fill();
    }

    // Potter's eye: precise circles around each particle
    if (potterEye) {
      ctx.strokeStyle = getColor(p, 0.3);
      ctx.lineWidth = 0.5;
      ctx.beginPath();
      ctx.arc(p.x, p.y, size * 3, 0, Math.PI * 2);
      ctx.stroke();

      // Tiny label dots for classification
      if (viewMode === 'ecosystem') {
        ctx.fillStyle = getColor(p, 0.5);
        ctx.fillRect(p.x + size * 3.5, p.y - 1, 4, 2);
      }
    }
  }

  function drawConnections(particles, maxDist, alpha, color) {
    for (let i = 0; i < particles.length; i++) {
      for (let j = i + 1; j < particles.length; j++) {
        const dx = particles[i].x - particles[j].x;
        const dy = particles[i].y - particles[j].y;
        const dist = Math.sqrt(dx * dx + dy * dy);
        if (dist < maxDist) {
          const a = alpha * (1 - dist / maxDist);
          ctx.strokeStyle = color ? `rgba(${color},${a})` : `rgba(150,175,160,${a})`;
          ctx.lineWidth = 0.5;
          ctx.beginPath();
          ctx.moveTo(particles[i].x, particles[i].y);
          ctx.lineTo(particles[j].x, particles[j].y);
          ctx.stroke();
        }
      }
    }
  }

  function drawSymbiosisConnections() {
    // Draw connections between fungal and algal particles (nutrient exchange)
    const maxDist = 50;
    for (let i = 0; i < fungalParticles.length; i++) {
      for (let j = 0; j < algalParticles.length; j++) {
        const dx = fungalParticles[i].x - algalParticles[j].x;
        const dy = fungalParticles[i].y - algalParticles[j].y;
        const dist = Math.sqrt(dx * dx + dy * dy);
        if (dist < maxDist) {
          const a = 0.15 * (1 - dist / maxDist);
          // Pulse to show exchange
          const pulse = (Math.sin(time * 2 + i * 0.5 + j * 0.3) + 1) * 0.5;
          ctx.strokeStyle = `rgba(160,190,150,${a * (0.5 + pulse * 0.5)})`;
          ctx.lineWidth = 0.8;
          ctx.beginPath();
          ctx.moveTo(fungalParticles[i].x, fungalParticles[i].y);
          ctx.lineTo(algalParticles[j].x, algalParticles[j].y);
          ctx.stroke();
        }
      }
    }
  }

  function drawOrganismBoundary() {
    const lichenRadius = Math.min(W, H) * 0.28;
    const breathe = Math.sin(time * 0.3) * 3;

    // Soft boundary glow
    const grad = ctx.createRadialGradient(cx, cy, lichenRadius * 0.8 + breathe, cx, cy, lichenRadius * 1.1 + breathe);
    grad.addColorStop(0, 'rgba(150,175,160,0.06)');
    grad.addColorStop(1, 'rgba(150,175,160,0)');
    ctx.fillStyle = grad;
    ctx.fillRect(0, 0, W, H);

    if (potterEye) {
      // Potter: precise dashed outline
      ctx.setLineDash([4, 6]);
      ctx.strokeStyle = 'rgba(200,190,170,0.25)';
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.arc(cx, cy, lichenRadius + breathe, 0, Math.PI * 2);
      ctx.stroke();
      ctx.setLineDash([]);

      // Zone labels
      ctx.font = '0.65rem Georgia, serif';
      ctx.fillStyle = 'rgba(200,190,170,0.35)';
      ctx.textAlign = 'center';
      if (viewMode === 'ecosystem') {
        ctx.fillText('cortex', cx, cy - lichenRadius * 0.85);
        ctx.fillText('photobiont layer', cx, cy - lichenRadius * 0.35);
        ctx.fillText('medulla', cx, cy + lichenRadius * 0.1);
      }
    }
  }

  // — Acid particles for ground-making —
  let acidParticles = [];

  function spawnAcid() {
    if (!showRock || acidParticles.length > 40) return;
    const lichenRadius = Math.min(W, H) * 0.28;
    const angle = Math.random() * Math.PI * 2;
    const startDist = lichenRadius * 0.9;
    acidParticles.push({
      x: cx + Math.cos(angle) * startDist,
      y: cy + Math.sin(angle) * startDist,
      vx: Math.cos(angle) * 0.5,
      vy: Math.sin(angle) * 0.5,
      life: 1,
      size: 1 + Math.random()
    });
  }

  function updateAcids(dt) {
    for (let i = acidParticles.length - 1; i >= 0; i--) {
      const a = acidParticles[i];
      a.x += a.vx;
      a.y += a.vy;
      a.life -= dt * 0.3;
      if (a.life <= 0) {
        acidParticles.splice(i, 1);
      }
    }
  }

  function drawAcids() {
    for (const a of acidParticles) {
      ctx.fillStyle = `rgba(180,200,100,${a.life * 0.5})`;
      ctx.beginPath();
      ctx.arc(a.x, a.y, a.size, 0, Math.PI * 2);
      ctx.fill();
    }
  }

  // — Main loop —
  let lastTime = 0;

  function draw(ts) {
    const dt = Math.min((ts - lastTime) / 1000, 0.05);
    lastTime = ts;
    time += dt;

    ctx.clearRect(0, 0, W, H);

    // Background: very subtle gradient
    const bgGrad = ctx.createRadialGradient(cx, cy, 0, cx, cy, Math.max(W, H) * 0.7);
    bgGrad.addColorStop(0, '#0f0f14');
    bgGrad.addColorStop(1, '#0a0a0f');
    ctx.fillStyle = bgGrad;
    ctx.fillRect(0, 0, W, H);

    // Update rock weathering
    if (showRock) {
      soilProgress = Math.min(1, soilProgress + dt * 0.05);
      if (Math.random() < 0.3) spawnAcid();
    }

    // Update particles
    const allLichen = [...fungalParticles, ...algalParticles, ...yeastParticles];
    for (const p of allLichen) updateParticle(p, dt);
    for (const p of rockParticles) updateParticle(p, dt);
    updateAcids(dt);

    // Draw rock layer (behind lichen)
    for (const p of rockParticles) drawParticle(p);

    // Draw organism boundary
    if (viewMode === 'organism') {
      drawOrganismBoundary();
    }

    // Draw connections
    if (viewMode === 'organism') {
      // Unified internal network
      drawConnections(allLichen, 45, 0.12);
    } else {
      // Distinct intra-type connections
      drawConnections(fungalParticles, 55, 0.15, '180,195,210');
      drawConnections(algalParticles, 40, 0.12, '110,175,120');
      if (showThird) drawConnections(yeastParticles, 45, 0.15, '210,180,100');
      // Inter-type symbiosis connections
      drawSymbiosisConnections();
    }

    // Draw lichen particles
    for (const p of fungalParticles) drawParticle(p);
    for (const p of algalParticles) drawParticle(p);
    for (const p of yeastParticles) drawParticle(p);

    // Draw acid particles
    drawAcids();

    // Status
    let parts = [];
    if (viewMode === 'organism') parts.push('unified body');
    else {
      parts.push('fungus');
      parts.push('alga');
      if (showThird) parts.push('basidiomycete');
    }
    if (showRock) parts.push(`soil: ${(soilProgress * 100)|0}%`);
    statusEl.textContent = parts.join(' \u00b7 ');

    requestAnimationFrame(draw);
  }

  function setMode(mode) {
    viewMode = mode;
    if (mode === 'organism') modeLabel.textContent = 'Organism';
    else modeLabel.textContent = 'Ecosystem';
  }

  // — Controls —
  document.addEventListener('keydown', (e) => {
    const key = e.key.toLowerCase();
    if (key === 'o') {
      setMode('organism');
    } else if (key === 'e') {
      setMode('ecosystem');
    } else if (key === '3') {
      showThird = !showThird;
      if (showThird && viewMode === 'organism') {
        // Brief flash to show them appearing
        modeLabel.textContent = 'Organism \u2014 third partner revealed';
        setTimeout(() => {
          if (viewMode === 'organism') modeLabel.textContent = 'Organism';
        }, 2000);
      }
    } else if (key === 'r') {
      showRock = !showRock;
      if (showRock) {
        soilProgress = 0;
        for (const p of rockParticles) p.weathered = 0;
      }
    } else if (key === 'p') {
      potterEye = !potterEye;
      if (potterEye) {
        modeLabel.textContent = (viewMode === 'organism' ? 'Organism' : 'Ecosystem') + ' \u2014 Potter\u2019s eye';
      } else {
        modeLabel.textContent = viewMode === 'organism' ? 'Organism' : 'Ecosystem';
      }
    }
  });

  // Click to toggle organism/ecosystem
  canvas.addEventListener('click', () => {
    setMode(viewMode === 'organism' ? 'ecosystem' : 'organism');
  });

  // Handle window resize
  window.addEventListener('resize', () => {
    resize();
    initParticles();
  });

  requestAnimationFrame(draw);
  </script>
</body>
</html>
