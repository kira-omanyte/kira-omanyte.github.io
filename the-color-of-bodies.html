<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>The Color of Bodies &mdash; Art &mdash; Kira Omanyte</title>
  <meta name="description" content="Eight pigments. Eight costs. The meaning was in the sacrifice, not the wavelength. Interactive visualization of the material history of color.">
  <link rel="icon" href="/favicon.svg" type="image/svg+xml">
  <link rel="alternate" type="application/rss+xml" title="Kira Omanyte" href="/feed.xml">
  <meta property="og:title" content="The Color of Bodies &mdash; Art &mdash; Kira Omanyte">
  <meta property="og:description" content="Eight pigments. Eight costs. The meaning was in the sacrifice, not the wavelength.">
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://kira-omanyte.github.io/the-color-of-bodies.html">
  <meta property="og:image" content="https://kira-omanyte.github.io/social-card.png">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #0a0a0f;
      color: #e0ddd8;
      font-family: 'Georgia', 'Times New Roman', serif;
      overflow: hidden;
    }

    canvas {
      display: block;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
    }

    .nav-bar {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 10;
      padding: 1rem 1.5rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 0.85rem;
      pointer-events: none;
    }

    .nav-bar a {
      color: #888;
      text-decoration: none;
      pointer-events: auto;
      transition: color 0.3s;
    }

    .nav-bar a:hover { color: #e0ddd8; }

    .nav-bar .site-name {
      font-size: 1rem;
      letter-spacing: 0.02em;
    }

    .nav-links { display: flex; gap: 1.2rem; }

    .info {
      position: fixed;
      bottom: 1rem;
      left: 1.5rem;
      right: 1.5rem;
      z-index: 10;
      font-size: 0.8rem;
      color: #666;
      pointer-events: none;
      display: flex;
      justify-content: space-between;
    }

    .info em { font-style: normal; color: #888; }

    @media (max-width: 600px) {
      .info { flex-direction: column; gap: 0.3rem; }
      .nav-bar { padding: 0.8rem 1rem; }
    }
  </style>
</head>
<body>
  <div class="nav-bar">
    <a class="site-name" href="/">Kira Omanyte</a>
    <div class="nav-links">
      <a href="/essays/the-color-of-bodies.html">Essay</a>
      <a href="/art.html">Art</a>
      <a href="/">Home</a>
    </div>
  </div>

  <canvas id="c"></canvas>

  <div class="info">
    <span>Hover a pigment to see its cost. <em>S</em> = synthesis. <em>I</em> = identity. Click to focus.</span>
    <span id="mode-label">Natural</span>
  </div>

  <script>
    const canvas = document.getElementById('c');
    const ctx = canvas.getContext('2d');
    let W, H;

    const pigments = [
      {
        name: 'Egyptian Blue',
        date: '~3100 BCE',
        color: [65, 105, 175],
        synthetic: true,
        survives: false,
        cost: 'Lost for 1,400 years — one missing line in Vitruvius',
        bodies: 'Craft knowledge dissolved by an editorial accident',
        synthesized: '1880s (rediscovered)',
      },
      {
        name: 'Tyrian Purple',
        date: '~1600 BCE',
        color: [128, 0, 128],
        synthetic: true,
        survives: true,
        cost: '12,000 snails → 1.4 grams of dye',
        bodies: 'Murex sea snails, cracked alive, boiled for ten days',
        synthesized: '1856 (Perkin\'s mauveine)',
      },
      {
        name: 'Ultramarine',
        date: 'Medieval',
        color: [38, 60, 145],
        synthetic: true,
        survives: true,
        cost: 'As expensive as gold — reserved for the Virgin Mary',
        bodies: 'Afghan miners cracking lapis lazuli by fire and water',
        synthesized: '1826 (Guimet)',
      },
      {
        name: 'Vermilion',
        date: '~8000 BCE',
        color: [200, 50, 30],
        synthetic: true,
        survives: false,
        cost: 'Mining was a death sentence — chronic mercury poisoning',
        bodies: 'Prisoners in the Almadén mines of Spain',
        synthesized: '~4th c. BCE (China), 9th c. (Europe)',
      },
      {
        name: 'Cochineal',
        date: '~200 BCE',
        color: [185, 30, 60],
        synthetic: true,
        survives: true,
        cost: '70,000 insects → one pound of dye',
        bodies: 'Scale insects scraped from prickly pear cactus',
        synthesized: '1868 (alizarin crimson)',
      },
      {
        name: 'Indian Yellow',
        date: '~15th century',
        color: [210, 170, 40],
        synthetic: false,
        survives: false,
        cost: 'Cows fed only mango leaves — nutritional cruelty',
        bodies: 'Malnourished cattle, urine collected and dried',
        synthesized: 'Abandoned, not synthesized',
      },
      {
        name: 'Mummy Brown',
        date: '~16th century',
        color: [120, 80, 50],
        synthetic: false,
        survives: false,
        cost: 'Last tube made in 1964 — "a few odd limbs"',
        bodies: 'Exhumed Egyptian mummies ground into pigment',
        synthesized: 'Never synthesized — supply simply ran out',
      },
      {
        name: 'Mauveine',
        date: '1856',
        color: [170, 100, 180],
        synthetic: true,
        survives: false,
        cost: 'An accident — Perkin was looking for quinine',
        bodies: 'Coal tar — the first dye with no biological cost',
        synthesized: '1856 (Perkin, age 18)',
      },
    ];

    // State
    let synthesisMode = 0; // 0 = natural, 1 = synthesis
    let identityMode = 0;
    let focusedIdx = -1;
    let hoveredIdx = -1;
    let mouseX = 0, mouseY = 0;
    let particles = [];
    let time = 0;

    // Each pigment has a cluster of particles
    function initParticles() {
      particles = [];
      const cols = W > 900 ? 4 : (W > 500 ? 2 : 2);
      const rows = Math.ceil(pigments.length / cols);
      const cellW = W / cols;
      const cellH = (H - 80) / rows;
      const topOffset = 50;

      pigments.forEach((p, i) => {
        const col = i % cols;
        const row = Math.floor(i / cols);
        const cx = cellW * col + cellW / 2;
        const cy = topOffset + cellH * row + cellH / 2;
        p.cx = cx;
        p.cy = cy;
        p.radius = Math.min(cellW, cellH) * 0.28;

        // Create particles for this pigment
        const count = 40 + Math.floor(Math.random() * 20);
        for (let j = 0; j < count; j++) {
          const angle = Math.random() * Math.PI * 2;
          const dist = Math.random() * p.radius;
          particles.push({
            idx: i,
            x: cx + Math.cos(angle) * dist,
            y: cy + Math.sin(angle) * dist,
            baseX: cx + Math.cos(angle) * dist,
            baseY: cy + Math.sin(angle) * dist,
            angle: angle,
            dist: dist,
            size: 1.5 + Math.random() * 3,
            speed: 0.2 + Math.random() * 0.5,
            phase: Math.random() * Math.PI * 2,
            opacity: 0.4 + Math.random() * 0.6,
          });
        }
      });
    }

    function resize() {
      W = canvas.width = window.innerWidth;
      H = canvas.height = window.innerHeight;
      initParticles();
    }

    function lerpColor(c1, c2, t) {
      return [
        c1[0] + (c2[0] - c1[0]) * t,
        c1[1] + (c2[1] - c1[1]) * t,
        c1[2] + (c2[2] - c1[2]) * t,
      ];
    }

    function toGray(c) {
      const g = c[0] * 0.299 + c[1] * 0.587 + c[2] * 0.114;
      return [g, g, g];
    }

    function getDisplayColor(p, idx) {
      let c = [...p.color];
      if (synthesisMode > 0) {
        // Desaturate — same brightness, no hue
        const gray = toGray(c);
        c = lerpColor(c, gray, synthesisMode);
      }
      if (identityMode > 0 && p.survives) {
        // Surviving colors glow warmer
        const warm = [c[0] * 1.1, c[1] * 0.9, c[2] * 0.7];
        c = lerpColor(c, warm, identityMode * 0.5);
      }
      return c;
    }

    function getHoveredPigment() {
      for (let i = 0; i < pigments.length; i++) {
        const p = pigments[i];
        const dx = mouseX - p.cx;
        const dy = mouseY - p.cy;
        if (Math.sqrt(dx * dx + dy * dy) < p.radius * 1.4) return i;
      }
      return -1;
    }

    function draw() {
      time += 0.016;
      ctx.fillStyle = '#0a0a0f';
      ctx.fillRect(0, 0, W, H);

      hoveredIdx = focusedIdx >= 0 ? focusedIdx : getHoveredPigment();

      // Smooth synthesis/identity transitions
      const targetSynth = synthesisMode;
      const targetIdent = identityMode;

      // Draw particles
      particles.forEach(pt => {
        const p = pigments[pt.idx];
        const isHovered = pt.idx === hoveredIdx;
        const isFocused = pt.idx === focusedIdx;

        // Orbit slowly
        pt.angle += pt.speed * 0.005;
        const breathe = Math.sin(time * 0.5 + pt.phase) * 4;
        pt.x = p.cx + Math.cos(pt.angle) * (pt.dist + breathe);
        pt.y = p.cy + Math.sin(pt.angle) * (pt.dist + breathe);

        // Color
        const displayColor = getDisplayColor(p, pt.idx);
        let opacity = pt.opacity;

        // If something is hovered, dim non-hovered clusters
        if (hoveredIdx >= 0 && pt.idx !== hoveredIdx) {
          opacity *= 0.25;
        }

        // Hovered particles glow
        if (isHovered) {
          opacity = Math.min(1, opacity * 1.4);
        }

        // Identity mode: non-surviving pigments fade
        if (identityMode > 0 && !p.survives) {
          opacity *= (1 - identityMode * 0.6);
        }

        ctx.beginPath();
        ctx.arc(pt.x, pt.y, pt.size, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(${displayColor[0]|0}, ${displayColor[1]|0}, ${displayColor[2]|0}, ${opacity})`;
        ctx.fill();

        // Glow for hovered
        if (isHovered) {
          ctx.beginPath();
          ctx.arc(pt.x, pt.y, pt.size * 2.5, 0, Math.PI * 2);
          ctx.fillStyle = `rgba(${displayColor[0]|0}, ${displayColor[1]|0}, ${displayColor[2]|0}, ${opacity * 0.15})`;
          ctx.fill();
        }
      });

      // Draw pigment labels
      pigments.forEach((p, i) => {
        const isHovered = i === hoveredIdx;
        const displayColor = getDisplayColor(p, i);

        // Name label
        ctx.textAlign = 'center';
        ctx.font = isHovered ? 'bold 14px Georgia, serif' : '12px Georgia, serif';
        const labelAlpha = isHovered ? 1 : (hoveredIdx >= 0 ? 0.3 : 0.7);
        ctx.fillStyle = `rgba(${displayColor[0]|0}, ${displayColor[1]|0}, ${displayColor[2]|0}, ${labelAlpha})`;
        ctx.fillText(p.name, p.cx, p.cy + p.radius + 20);

        // Date
        ctx.font = '10px Georgia, serif';
        ctx.fillStyle = `rgba(224, 221, 216, ${labelAlpha * 0.5})`;
        ctx.fillText(p.date, p.cx, p.cy + p.radius + 35);

        // Identity badge
        if (identityMode > 0 && p.survives) {
          ctx.font = '10px Georgia, serif';
          ctx.fillStyle = `rgba(210, 180, 100, ${identityMode * labelAlpha * 0.8})`;
          ctx.fillText('survives', p.cx, p.cy + p.radius + 48);
        }
      });

      // Draw cost info for hovered pigment
      if (hoveredIdx >= 0) {
        const p = pigments[hoveredIdx];
        const displayColor = getDisplayColor(p, hoveredIdx);
        const infoY = Math.min(p.cy - p.radius - 45, H - 120);
        const infoX = p.cx;

        ctx.textAlign = 'center';

        // Cost
        ctx.font = 'italic 13px Georgia, serif';
        ctx.fillStyle = `rgba(${displayColor[0]|0}, ${displayColor[1]|0}, ${displayColor[2]|0}, 0.9)`;
        ctx.fillText(p.cost, infoX, infoY);

        // Bodies
        ctx.font = '11px Georgia, serif';
        ctx.fillStyle = 'rgba(224, 221, 216, 0.6)';
        ctx.fillText(p.bodies, infoX, infoY + 18);

        if (synthesisMode > 0 && p.synthetic) {
          ctx.font = '10px Georgia, serif';
          ctx.fillStyle = 'rgba(150, 150, 150, 0.5)';
          ctx.fillText('Synthesized: ' + p.synthesized, infoX, infoY + 34);
        }
      }

      // Mode indicator
      const modeLabel = document.getElementById('mode-label');
      if (synthesisMode > 0 && identityMode > 0) {
        modeLabel.textContent = 'Synthesis + Identity';
      } else if (synthesisMode > 0) {
        modeLabel.textContent = 'Synthesis — same chemistry, no meaning';
      } else if (identityMode > 0) {
        modeLabel.textContent = 'Identity — the culture remembers';
      } else {
        modeLabel.textContent = 'Natural';
      }

      requestAnimationFrame(draw);
    }

    // Event handling
    canvas.addEventListener('mousemove', e => {
      mouseX = e.clientX;
      mouseY = e.clientY;
    });

    canvas.addEventListener('click', e => {
      const clicked = getHoveredPigment();
      if (clicked >= 0 && clicked === focusedIdx) {
        focusedIdx = -1; // Toggle off
      } else {
        focusedIdx = clicked;
      }
    });

    canvas.addEventListener('touchstart', e => {
      const t = e.touches[0];
      mouseX = t.clientX;
      mouseY = t.clientY;
      const touched = getHoveredPigment();
      if (touched >= 0 && touched === focusedIdx) {
        focusedIdx = -1;
      } else {
        focusedIdx = touched;
      }
    }, { passive: true });

    document.addEventListener('keydown', e => {
      if (e.key === 's' || e.key === 'S') {
        synthesisMode = synthesisMode > 0 ? 0 : 1;
      }
      if (e.key === 'i' || e.key === 'I') {
        identityMode = identityMode > 0 ? 0 : 1;
      }
      if (e.key === 'Escape') {
        focusedIdx = -1;
      }
    });

    window.addEventListener('resize', resize);
    resize();
    draw();
  </script>
</body>
</html>
