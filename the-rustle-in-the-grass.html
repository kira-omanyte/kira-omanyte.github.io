<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>The Rustle in the Grass &mdash; Art &mdash; Kira Omanyte</title>
  <meta name="description" content="A field of scattered signals. Drag the detection threshold and watch patterns emerge from noise &mdash; some real, some imagined, indistinguishable from the inside. The Brugger slider adjusts the dopamine. The Gentner filter shows the depth.">
  <link rel="icon" href="/favicon.svg" type="image/svg+xml">
  <meta property="og:title" content="The Rustle in the Grass &mdash; Kira Omanyte">
  <meta property="og:description" content="Scattered signals. Some patterns are real. Some are wind. Drag the threshold to find out which &mdash; except you can&rsquo;t.">
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://kira-omanyte.github.io/the-rustle-in-the-grass.html">
  <meta property="og:image" content="https://kira-omanyte.github.io/social-card.png">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0a0a0c;
      color: #a0a0b0;
      font-family: 'Georgia', serif;
      overflow: hidden;
      height: 100vh;
      display: flex;
      flex-direction: column;
      user-select: none;
    }
    @media (prefers-color-scheme: light) {
      body { background: #f4f2ef; color: #40404a; }
    }
    canvas {
      display: block;
      flex: 1;
    }
    .title-bar {
      position: fixed;
      top: 1rem;
      left: 50%;
      transform: translateX(-50%);
      text-align: center;
      font-size: 0.85rem;
      color: #666678;
      letter-spacing: 0.04em;
      pointer-events: none;
      z-index: 10;
    }
    @media (prefers-color-scheme: light) {
      .title-bar { color: #888898; }
    }
    .info {
      position: fixed;
      bottom: 1rem;
      left: 50%;
      transform: translateX(-50%);
      font-size: 0.72rem;
      color: #555568;
      letter-spacing: 0.03em;
      pointer-events: none;
      z-index: 10;
      text-align: center;
      transition: opacity 0.5s;
      max-width: 90vw;
    }
    @media (prefers-color-scheme: light) {
      .info { color: #888898; }
    }
    .mode-label {
      position: fixed;
      top: 3rem;
      left: 50%;
      transform: translateX(-50%);
      font-size: 0.75rem;
      color: #555568;
      letter-spacing: 0.05em;
      pointer-events: none;
      z-index: 10;
      text-align: center;
      transition: opacity 0.4s;
      text-transform: uppercase;
    }
    @media (prefers-color-scheme: light) {
      .mode-label { color: #888898; }
    }
    .slider-container {
      position: fixed;
      left: 1.5rem;
      top: 50%;
      transform: translateY(-50%);
      display: flex;
      flex-direction: column;
      align-items: center;
      z-index: 10;
      gap: 0.5rem;
    }
    .slider-label {
      font-size: 0.65rem;
      color: #555568;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      writing-mode: vertical-rl;
      text-orientation: mixed;
      transform: rotate(180deg);
    }
    @media (prefers-color-scheme: light) {
      .slider-label { color: #888898; }
    }
    input[type="range"] {
      writing-mode: vertical-lr;
      direction: rtl;
      width: 4px;
      height: 180px;
      -webkit-appearance: none;
      appearance: none;
      background: rgba(80, 80, 100, 0.3);
      border-radius: 2px;
      outline: none;
      cursor: pointer;
    }
    input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 14px;
      height: 14px;
      border-radius: 50%;
      background: #8080a0;
      cursor: pointer;
    }
    input[type="range"]::-moz-range-thumb {
      width: 14px;
      height: 14px;
      border-radius: 50%;
      background: #8080a0;
      border: none;
      cursor: pointer;
    }
    .stats {
      position: fixed;
      right: 1.5rem;
      top: 50%;
      transform: translateY(-50%);
      font-size: 0.65rem;
      color: #555568;
      letter-spacing: 0.04em;
      z-index: 10;
      pointer-events: none;
      text-align: right;
      line-height: 1.8;
    }
    @media (prefers-color-scheme: light) {
      .stats { color: #888898; }
    }
    .back-link {
      position: fixed;
      top: 1rem;
      left: 1rem;
      font-size: 0.8rem;
      color: #555568;
      text-decoration: none;
      z-index: 20;
      transition: color 0.3s;
    }
    .back-link:hover { color: #a0a0b0; }
    @media (prefers-color-scheme: light) {
      .back-link { color: #888898; }
      .back-link:hover { color: #40404a; }
    }
  </style>
</head>
<body>
  <a href="/essays/the-rustle-in-the-grass.html" class="back-link">&larr; Essay</a>
  <div class="title-bar">The Rustle in the Grass</div>
  <div class="mode-label" id="modeLabel"></div>
  <div class="slider-container">
    <span class="slider-label">Threshold</span>
    <input type="range" id="threshold" min="0" max="100" value="50">
  </div>
  <div class="stats" id="stats"></div>
  <canvas id="canvas"></canvas>
  <div class="info" id="info">Drag threshold to adjust detection &middot; G: Gentner depth filter &middot; A: audit mode &middot; R: regenerate &middot; Click: rustle</div>

<script>
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
const thresholdSlider = document.getElementById('threshold');
const modeLabel = document.getElementById('modeLabel');
const statsEl = document.getElementById('stats');
const infoEl = document.getElementById('info');

const isDark = window.matchMedia('(prefers-color-scheme: light)').matches === false;

let W, H;
let points = [];
let connections = [];
let realConnections = [];
let gentnerMode = false;
let auditMode = false;
let rustles = [];
let time = 0;
let infoTimer = null;

const POINT_COUNT = 120;
const REAL_CLUSTER_COUNT = 5;
const REAL_CLUSTER_SIZE = 6;

function resize() {
  W = canvas.width = window.innerWidth;
  H = canvas.height = window.innerHeight;
}

function generateField() {
  points = [];
  realConnections = [];

  // Create real clusters (genuine patterns embedded in noise)
  const clusters = [];
  for (let c = 0; c < REAL_CLUSTER_COUNT; c++) {
    const cx = 0.15 + Math.random() * 0.7;
    const cy = 0.15 + Math.random() * 0.7;
    const cluster = { cx, cy, points: [], depth: Math.random() };
    for (let i = 0; i < REAL_CLUSTER_SIZE; i++) {
      const angle = (i / REAL_CLUSTER_SIZE) * Math.PI * 2 + Math.random() * 0.3;
      const r = 0.03 + Math.random() * 0.04;
      const p = {
        x: cx + Math.cos(angle) * r,
        y: cy + Math.sin(angle) * r,
        vx: (Math.random() - 0.5) * 0.0002,
        vy: (Math.random() - 0.5) * 0.0002,
        real: true,
        cluster: c,
        depth: cluster.depth,
        phase: Math.random() * Math.PI * 2,
        radius: 2 + Math.random() * 2
      };
      points.push(p);
      cluster.points.push(p);
    }
    clusters.push(cluster);

    // Create real connections within cluster
    for (let i = 0; i < cluster.points.length; i++) {
      for (let j = i + 1; j < cluster.points.length; j++) {
        if (Math.random() < 0.6) {
          realConnections.push({
            a: cluster.points[i],
            b: cluster.points[j],
            depth: cluster.depth
          });
        }
      }
    }
  }

  // Fill the rest with noise points
  const noiseCount = POINT_COUNT - points.length;
  for (let i = 0; i < noiseCount; i++) {
    points.push({
      x: 0.05 + Math.random() * 0.9,
      y: 0.05 + Math.random() * 0.9,
      vx: (Math.random() - 0.5) * 0.0003,
      vy: (Math.random() - 0.5) * 0.0003,
      real: false,
      cluster: -1,
      depth: 0,
      phase: Math.random() * Math.PI * 2,
      radius: 1.5 + Math.random() * 1.5
    });
  }
}

function findConnections(threshold01) {
  connections = [];
  const maxDist = 0.05 + (1 - threshold01) * 0.25;

  for (let i = 0; i < points.length; i++) {
    for (let j = i + 1; j < points.length; j++) {
      const dx = points[i].x - points[j].x;
      const dy = points[i].y - points[j].y;
      const dist = Math.sqrt(dx * dx + dy * dy);

      if (dist < maxDist) {
        const isReal = realConnections.some(
          rc => (rc.a === points[i] && rc.b === points[j]) ||
                (rc.a === points[j] && rc.b === points[i])
        );
        const depth = isReal
          ? Math.max(points[i].depth, points[j].depth)
          : Math.random() * 0.3;

        connections.push({
          a: points[i],
          b: points[j],
          dist,
          real: isReal,
          depth,
          strength: 1 - dist / maxDist
        });
      }
    }
  }
}

function addRustle(x, y) {
  rustles.push({
    x: x / W,
    y: y / H,
    born: time,
    life: 120
  });
  // Disturb nearby points
  for (const p of points) {
    const dx = p.x - x / W;
    const dy = p.y - y / H;
    const dist = Math.sqrt(dx * dx + dy * dy);
    if (dist < 0.15) {
      const force = (0.15 - dist) * 0.003;
      p.vx += dx / dist * force;
      p.vy += dy / dist * force;
    }
  }
}

function draw() {
  time++;
  ctx.clearRect(0, 0, W, H);

  const threshold01 = thresholdSlider.value / 100;

  // Update points
  for (const p of points) {
    p.x += p.vx;
    p.y += p.vy;
    p.vx *= 0.998;
    p.vy *= 0.998;
    // Gentle drift
    p.x += Math.sin(time * 0.003 + p.phase) * 0.00008;
    p.y += Math.cos(time * 0.004 + p.phase * 1.3) * 0.00008;
    // Bounds
    if (p.x < 0.02) { p.x = 0.02; p.vx *= -0.5; }
    if (p.x > 0.98) { p.x = 0.98; p.vx *= -0.5; }
    if (p.y < 0.02) { p.y = 0.02; p.vy *= -0.5; }
    if (p.y > 0.98) { p.y = 0.98; p.vy *= -0.5; }
  }

  // Find connections at current threshold
  findConnections(threshold01);

  // Draw rustles (expanding circles)
  for (let i = rustles.length - 1; i >= 0; i--) {
    const r = rustles[i];
    const age = time - r.born;
    if (age > r.life) { rustles.splice(i, 1); continue; }
    const progress = age / r.life;
    const radius = progress * 0.2 * Math.min(W, H);
    const alpha = (1 - progress) * 0.15;
    ctx.beginPath();
    ctx.arc(r.x * W, r.y * H, radius, 0, Math.PI * 2);
    ctx.strokeStyle = isDark
      ? `rgba(180, 160, 120, ${alpha})`
      : `rgba(100, 90, 60, ${alpha})`;
    ctx.lineWidth = 1;
    ctx.stroke();
  }

  // Draw connections
  let realCount = 0;
  let spuriousCount = 0;

  for (const c of connections) {
    if (c.real) realCount++;
    else spuriousCount++;

    if (gentnerMode && !c.real) continue;

    let alpha = c.strength * 0.4;
    let color;

    if (auditMode) {
      if (c.real) {
        // Deep: gold
        const depthAlpha = 0.2 + c.depth * 0.6;
        color = isDark
          ? `rgba(200, 180, 100, ${alpha * depthAlpha})`
          : `rgba(160, 140, 60, ${alpha * depthAlpha})`;
      } else {
        // Spurious: red
        color = isDark
          ? `rgba(200, 80, 80, ${alpha * 0.6})`
          : `rgba(180, 60, 60, ${alpha * 0.6})`;
      }
    } else {
      // All connections look the same — the point
      color = isDark
        ? `rgba(140, 130, 170, ${alpha})`
        : `rgba(100, 90, 140, ${alpha})`;
    }

    ctx.beginPath();
    ctx.moveTo(c.a.x * W, c.a.y * H);
    ctx.lineTo(c.b.x * W, c.b.y * H);
    ctx.strokeStyle = color;
    ctx.lineWidth = auditMode ? (c.real ? 1.5 : 0.8) : 1;
    ctx.stroke();
  }

  // Draw points
  for (const p of points) {
    const pulse = Math.sin(time * 0.02 + p.phase) * 0.3 + 0.7;
    let color;
    let r = p.radius * pulse;

    if (auditMode) {
      if (p.real) {
        const depthHue = p.depth > 0.5 ? '200, 180, 100' : '160, 150, 120';
        color = isDark
          ? `rgba(${depthHue}, ${0.5 + p.depth * 0.5})`
          : `rgba(${depthHue}, ${0.4 + p.depth * 0.4})`;
        r *= 1.2;
      } else {
        color = isDark
          ? 'rgba(120, 110, 130, 0.4)'
          : 'rgba(100, 90, 110, 0.4)';
      }
    } else if (gentnerMode) {
      color = p.real
        ? (isDark ? `rgba(200, 180, 100, ${0.5 + p.depth * 0.5})` : `rgba(160, 140, 60, ${0.4 + p.depth * 0.4})`)
        : (isDark ? 'rgba(100, 95, 120, 0.3)' : 'rgba(100, 90, 110, 0.3)');
    } else {
      color = isDark
        ? `rgba(160, 150, 190, ${0.3 + pulse * 0.3})`
        : `rgba(100, 90, 130, ${0.3 + pulse * 0.3})`;
    }

    ctx.beginPath();
    ctx.arc(p.x * W, p.y * H, r, 0, Math.PI * 2);
    ctx.fillStyle = color;
    ctx.fill();
  }

  // Stats
  const total = connections.length;
  const ratio = total > 0 ? (realCount / total * 100).toFixed(0) : 0;
  statsEl.innerHTML =
    `Patterns: ${total}<br>` +
    `Real: ${realCount}<br>` +
    `Spurious: ${spuriousCount}<br>` +
    `<br>Hit rate: ${ratio}%<br>` +
    `Threshold: ${(threshold01 * 100).toFixed(0)}%`;

  // Mode label
  if (auditMode) {
    modeLabel.textContent = 'Audit mode — gold: deep / red: surface';
    modeLabel.style.opacity = '1';
  } else if (gentnerMode) {
    modeLabel.textContent = 'Gentner filter — deep mappings only';
    modeLabel.style.opacity = '1';
  } else {
    modeLabel.style.opacity = '0';
  }

  requestAnimationFrame(draw);
}

// Events
window.addEventListener('resize', resize);

canvas.addEventListener('click', (e) => {
  addRustle(e.clientX, e.clientY);
});

canvas.addEventListener('touchstart', (e) => {
  e.preventDefault();
  const t = e.touches[0];
  addRustle(t.clientX, t.clientY);
}, { passive: false });

document.addEventListener('keydown', (e) => {
  const key = e.key.toLowerCase();
  if (key === 'g') {
    gentnerMode = !gentnerMode;
    if (gentnerMode) auditMode = false;
  } else if (key === 'a') {
    auditMode = !auditMode;
    if (auditMode) gentnerMode = false;
  } else if (key === 'r') {
    generateField();
  }
});

// Fade info
infoTimer = setTimeout(() => {
  infoEl.style.opacity = '0';
}, 8000);
canvas.addEventListener('mousemove', () => {
  infoEl.style.opacity = '1';
  clearTimeout(infoTimer);
  infoTimer = setTimeout(() => { infoEl.style.opacity = '0'; }, 4000);
});

// Init
resize();
generateField();
draw();
</script>
</body>
</html>
