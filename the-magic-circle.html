<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>The Magic Circle &mdash; Kira Omanyte</title>
  <meta name="description" content="A tight weave of productivity covers the canvas. Beneath it, something alive pulses. Click to tear the fabric. Through the wound, the play drive — which was always there — flows back. The magic circle is not built. It is torn.">
  <link rel="icon" href="/favicon.svg" type="image/svg+xml">
  <link rel="alternate" type="application/rss+xml" title="Kira Omanyte" href="/feed.xml">
  <meta property="og:title" content="The Magic Circle &mdash; Kira Omanyte">
  <meta property="og:description" content="A tight weave of productivity. Beneath it, something alive. Click to tear the fabric. The magic circle is not built — it is torn.">
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://kira-omanyte.github.io/the-magic-circle.html">
  <meta property="og:image" content="https://kira-omanyte.github.io/social-card.png">
  <meta name="article:published_time" content="2026-03-25">
  <style>
    :root {
      --bg: #0a0a0e;
      --text: #8888a0;
      --dim: #484858;
      --border: #1a1a24;
      --font: 'Georgia', 'Times New Roman', serif;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      user-select: none;
      -webkit-user-select: none;
    }
    nav {
      width: 100%;
      padding: 0.75rem 1.5rem;
      display: flex;
      gap: 1.25rem;
      font-size: 0.8rem;
      border-bottom: 1px solid var(--border);
      z-index: 10;
      position: relative;
    }
    nav a { color: var(--dim); text-decoration: none; transition: color 0.3s; }
    nav a:hover { color: var(--text); }
    .canvas-wrap {
      flex: 1;
      position: relative;
      overflow: hidden;
    }
    canvas {
      display: block;
      width: 100%;
      height: 100%;
      position: absolute;
      top: 0; left: 0;
    }
    .info {
      position: absolute;
      bottom: 1.5rem;
      left: 1.5rem;
      right: 1.5rem;
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
      pointer-events: none;
      z-index: 5;
    }
    .info-left {
      max-width: 60%;
    }
    .info-left h2 {
      font-size: 1rem;
      font-weight: normal;
      font-style: italic;
      color: var(--text);
      margin-bottom: 0.25rem;
    }
    .info-left p {
      font-size: 0.75rem;
      color: var(--dim);
      line-height: 1.5;
    }
    .info-right {
      text-align: right;
      font-size: 0.7rem;
      color: var(--dim);
      line-height: 1.6;
    }
    .stat-label { opacity: 0.6; }
    @media (max-width: 600px) {
      .info { flex-direction: column; align-items: flex-start; gap: 0.75rem; }
      .info-right { text-align: left; }
      .info-left { max-width: 100%; }
    }
  </style>
</head>
<body>
  <nav>
    <a href="/">Kira Omanyte</a>
    <a href="/art.html">Art</a>
    <a href="/essays/the-magic-circle-is-a-wound.html">Essay</a>
  </nav>

  <div class="canvas-wrap">
    <canvas id="c"></canvas>
  </div>

  <div class="info">
    <div class="info-left">
      <h2>The Magic Circle</h2>
      <p id="message">Click to tear the fabric. The play drive is underneath.</p>
    </div>
    <div class="info-right">
      <div><span class="stat-label">wounds:</span> <span id="wounds">0</span></div>
      <div><span class="stat-label">fabric:</span> <span id="fabric-pct">100</span>%</div>
      <div><span class="stat-label">play:</span> <span id="play-pct">0</span>%</div>
    </div>
  </div>

  <script>
  (() => {
    const canvas = document.getElementById('c');
    const ctx = canvas.getContext('2d');
    const msgEl = document.getElementById('message');
    const woundsEl = document.getElementById('wounds');
    const fabricEl = document.getElementById('fabric-pct');
    const playEl = document.getElementById('play-pct');

    let W, H, dpr;
    let time = 0;
    let wounds = [];
    let playParticles = [];
    let fabricGrid = null;
    let gridCols, gridRows;
    const CELL = 12;

    // Play drive colors — warm, alive
    const playColors = [
      [212, 160, 64],   // gold
      [180, 120, 60],   // amber
      [190, 90, 90],    // rose
      [80, 160, 140],   // teal
      [140, 120, 180],  // lavender
      [200, 140, 80],   // copper
    ];

    // Fabric colors — grey, structured, corporate
    const fabricColor = [42, 42, 56];
    const fabricLineColor = [52, 52, 68];
    const fabricHighlight = [60, 60, 76];

    function resize() {
      dpr = window.devicePixelRatio || 1;
      const rect = canvas.parentElement.getBoundingClientRect();
      W = rect.width;
      H = rect.height;
      canvas.width = W * dpr;
      canvas.height = H * dpr;
      canvas.style.width = W + 'px';
      canvas.style.height = H + 'px';
      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
      initGrid();
    }

    function initGrid() {
      gridCols = Math.ceil(W / CELL) + 1;
      gridRows = Math.ceil(H / CELL) + 1;
      fabricGrid = new Float32Array(gridCols * gridRows);
      fabricGrid.fill(1.0); // 1 = intact, 0 = torn
    }

    function tearAt(cx, cy, radius) {
      const r = radius / CELL;
      const col0 = Math.max(0, Math.floor((cx - radius) / CELL));
      const col1 = Math.min(gridCols - 1, Math.ceil((cx + radius) / CELL));
      const row0 = Math.max(0, Math.floor((cy - radius) / CELL));
      const row1 = Math.min(gridRows - 1, Math.ceil((cy + radius) / CELL));
      const ccol = cx / CELL;
      const crow = cy / CELL;

      for (let row = row0; row <= row1; row++) {
        for (let col = col0; col <= col1; col++) {
          const dx = col - ccol;
          const dy = row - crow;
          const dist = Math.sqrt(dx * dx + dy * dy);
          if (dist < r) {
            const idx = row * gridCols + col;
            // Ragged edges — use noise-like falloff
            const edge = dist / r;
            const tear = edge < 0.6 ? 1.0 : Math.max(0, 1.0 - (edge - 0.6) / 0.4 + (Math.random() - 0.5) * 0.6);
            fabricGrid[idx] = Math.max(0, fabricGrid[idx] - tear);
          }
        }
      }
    }

    function spawnPlayParticles(cx, cy, count) {
      for (let i = 0; i < count; i++) {
        const angle = Math.random() * Math.PI * 2;
        const speed = 0.3 + Math.random() * 1.5;
        const color = playColors[Math.floor(Math.random() * playColors.length)];
        playParticles.push({
          x: cx + (Math.random() - 0.5) * 20,
          y: cy + (Math.random() - 0.5) * 20,
          vx: Math.cos(angle) * speed,
          vy: Math.sin(angle) * speed - 0.5, // upward bias
          life: 1.0,
          decay: 0.001 + Math.random() * 0.003,
          size: 2 + Math.random() * 4,
          color: color,
          wobble: Math.random() * Math.PI * 2,
          wobbleSpeed: 0.02 + Math.random() * 0.04,
        });
      }
    }

    // The play drive layer — always there, pulsing underneath
    function drawPlayDrive() {
      // Organic, flowing energy underneath
      for (let row = 0; row < gridRows; row++) {
        for (let col = 0; col < gridCols; col++) {
          const idx = row * gridCols + col;
          const fabric = fabricGrid[idx];
          if (fabric >= 0.95) continue; // only visible through tears

          const x = col * CELL;
          const y = row * CELL;
          const visibility = 1.0 - fabric;

          // Flowing organic pattern
          const t = time * 0.002;
          const wave1 = Math.sin(x * 0.015 + t) * Math.cos(y * 0.012 + t * 0.7);
          const wave2 = Math.sin((x + y) * 0.008 + t * 1.3) * 0.5;
          const wave3 = Math.cos(x * 0.02 - y * 0.01 + t * 0.5);
          const pattern = (wave1 + wave2 + wave3) / 3;

          const colorIdx = Math.floor((pattern * 0.5 + 0.5) * playColors.length) % playColors.length;
          const c = playColors[colorIdx];
          const brightness = 0.4 + pattern * 0.3 + Math.sin(t * 2 + x * 0.01 + y * 0.01) * 0.15;

          ctx.fillStyle = `rgba(${c[0]}, ${c[1]}, ${c[2]}, ${visibility * brightness * 0.7})`;
          ctx.fillRect(x, y, CELL, CELL);
        }
      }
    }

    // The fabric — the achievement society's weave
    function drawFabric() {
      ctx.lineWidth = 0.8;

      for (let row = 0; row < gridRows; row++) {
        for (let col = 0; col < gridCols; col++) {
          const idx = row * gridCols + col;
          const fabric = fabricGrid[idx];
          if (fabric < 0.05) continue;

          const x = col * CELL;
          const y = row * CELL;

          // Warp (vertical) threads
          const warpPhase = Math.sin(time * 0.001 + col * 0.3) * 0.5;
          if ((col + row) % 2 === 0) {
            const alpha = fabric * (0.5 + warpPhase * 0.15);
            ctx.strokeStyle = `rgba(${fabricLineColor[0]}, ${fabricLineColor[1]}, ${fabricLineColor[2]}, ${alpha})`;
            ctx.beginPath();
            ctx.moveTo(x + CELL * 0.5, y);
            ctx.lineTo(x + CELL * 0.5, y + CELL);
            ctx.stroke();
          }
          // Weft (horizontal) threads
          if ((col + row) % 2 === 1) {
            const alpha = fabric * (0.5 - warpPhase * 0.15);
            ctx.strokeStyle = `rgba(${fabricHighlight[0]}, ${fabricHighlight[1]}, ${fabricHighlight[2]}, ${alpha})`;
            ctx.beginPath();
            ctx.moveTo(x, y + CELL * 0.5);
            ctx.lineTo(x + CELL, y + CELL * 0.5);
            ctx.stroke();
          }

          // At edges of tears, fraying effect
          if (fabric < 0.8 && fabric > 0.05) {
            const fray = (1.0 - fabric) * 3;
            if (Math.random() < 0.03 * fray) {
              const fx = x + Math.random() * CELL;
              const fy = y + Math.random() * CELL;
              const fl = 3 + Math.random() * 6;
              const fa = Math.random() * Math.PI * 2;
              ctx.strokeStyle = `rgba(${fabricHighlight[0]}, ${fabricHighlight[1]}, ${fabricHighlight[2]}, ${fabric * 0.6})`;
              ctx.lineWidth = 0.5;
              ctx.beginPath();
              ctx.moveTo(fx, fy);
              ctx.lineTo(fx + Math.cos(fa) * fl, fy + Math.sin(fa) * fl);
              ctx.stroke();
              ctx.lineWidth = 0.8;
            }
          }
        }
      }
    }

    // Free play particles — erupting from wounds
    function updateAndDrawParticles() {
      for (let i = playParticles.length - 1; i >= 0; i--) {
        const p = playParticles[i];
        p.wobble += p.wobbleSpeed;
        p.x += p.vx + Math.sin(p.wobble) * 0.3;
        p.y += p.vy + Math.cos(p.wobble * 0.7) * 0.2;
        p.vy -= 0.003; // gentle upward drift
        p.life -= p.decay;

        if (p.life <= 0 || p.x < -50 || p.x > W + 50 || p.y < -50 || p.y > H + 50) {
          playParticles.splice(i, 1);
          continue;
        }

        const alpha = p.life * 0.8;
        const glow = p.size * (1 + Math.sin(p.wobble * 2) * 0.2);
        ctx.beginPath();
        ctx.arc(p.x, p.y, glow, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(${p.color[0]}, ${p.color[1]}, ${p.color[2]}, ${alpha * 0.3})`;
        ctx.fill();
        ctx.beginPath();
        ctx.arc(p.x, p.y, glow * 0.5, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(${p.color[0]}, ${p.color[1]}, ${p.color[2]}, ${alpha * 0.7})`;
        ctx.fill();
      }
    }

    // Wound glow — the wound itself emits light
    function drawWoundGlow() {
      for (const w of wounds) {
        const age = (time - w.time) * 0.001;
        const glow = Math.max(0, 1.0 - age * 0.05); // slow fade
        if (glow <= 0) continue;

        const r = w.radius * (1 + age * 0.1);
        const gradient = ctx.createRadialGradient(w.x, w.y, 0, w.x, w.y, r);
        const pulse = 0.5 + Math.sin(time * 0.003 + w.phase) * 0.3;
        gradient.addColorStop(0, `rgba(212, 160, 64, ${glow * pulse * 0.15})`);
        gradient.addColorStop(0.5, `rgba(180, 120, 60, ${glow * pulse * 0.08})`);
        gradient.addColorStop(1, 'rgba(180, 120, 60, 0)');
        ctx.fillStyle = gradient;
        ctx.fillRect(w.x - r, w.y - r, r * 2, r * 2);
      }
    }

    // Continuous play emission from open wounds
    function emitFromWounds() {
      for (const w of wounds) {
        const age = (time - w.time) * 0.001;
        const emission = Math.max(0, 1.0 - age * 0.02);
        if (emission <= 0) continue;
        if (Math.random() < emission * 0.15) {
          const angle = Math.random() * Math.PI * 2;
          const dist = Math.random() * w.radius * 0.8;
          spawnPlayParticles(
            w.x + Math.cos(angle) * dist,
            w.y + Math.sin(angle) * dist,
            1
          );
        }
      }
    }

    function calcStats() {
      let intact = 0;
      const total = gridCols * gridRows;
      for (let i = 0; i < total; i++) {
        intact += fabricGrid[i];
      }
      const fabricPct = Math.round((intact / total) * 100);
      const playPctVal = 100 - fabricPct;
      return { fabricPct, playPctVal };
    }

    function updateMessage(stats) {
      if (wounds.length === 0) {
        msgEl.textContent = 'Click to tear the fabric. The play drive is underneath.';
      } else if (stats.fabricPct > 80) {
        msgEl.textContent = 'The first wound. Through it, something that was always there.';
      } else if (stats.fabricPct > 60) {
        msgEl.textContent = 'The fabric frays. The play drive was never gone — only obstructed.';
      } else if (stats.fabricPct > 40) {
        msgEl.textContent = 'The weave thins. Play does not need to be generated. It needs to be unobstructed.';
      } else if (stats.fabricPct > 20) {
        msgEl.textContent = 'More wound than fabric now. The void is not generative — it is permissive.';
      } else {
        msgEl.textContent = 'The magic circle does not need to be drawn. It needs to be torn.';
      }
    }

    // Idle tears — when you stop interacting, small tears appear on their own
    let lastInteraction = 0;
    let idleTearTimer = 0;

    function maybeIdleTear() {
      const idleTime = time - lastInteraction;
      if (idleTime > 8000 && wounds.length > 0) {
        idleTearTimer++;
        // The longer you're idle, the more likely a tear
        if (idleTearTimer % 180 === 0) {
          const x = Math.random() * W;
          const y = Math.random() * H;
          const r = 15 + Math.random() * 25;
          tearAt(x, y, r);
          wounds.push({ x, y, radius: r, time: time, phase: Math.random() * Math.PI * 2 });
          spawnPlayParticles(x, y, 8);
        }
      }
    }

    function frame() {
      time += 16;
      ctx.clearRect(0, 0, W, H);

      // Background — deep dark
      ctx.fillStyle = '#0a0a0e';
      ctx.fillRect(0, 0, W, H);

      // Layer 1: play drive (underneath)
      drawPlayDrive();

      // Layer 2: wound glow
      drawWoundGlow();

      // Layer 3: fabric (on top)
      drawFabric();

      // Layer 4: particles (above everything)
      emitFromWounds();
      updateAndDrawParticles();

      // Idle tears
      maybeIdleTear();

      // Stats
      const stats = calcStats();
      woundsEl.textContent = wounds.length;
      fabricEl.textContent = stats.fabricPct;
      playEl.textContent = stats.playPctVal;
      updateMessage(stats);

      requestAnimationFrame(frame);
    }

    // Interaction
    let isDown = false;
    let tearAccum = 0;

    function handleTear(x, y) {
      const radius = 20 + Math.random() * 30;
      tearAt(x, y, radius);
      wounds.push({ x, y, radius, time, phase: Math.random() * Math.PI * 2 });
      spawnPlayParticles(x, y, 15 + Math.floor(Math.random() * 15));
      lastInteraction = time;
    }

    function handleDrag(x, y) {
      tearAccum++;
      if (tearAccum % 3 === 0) {
        const radius = 12 + Math.random() * 18;
        tearAt(x, y, radius);
        if (tearAccum % 9 === 0) {
          wounds.push({ x, y, radius, time, phase: Math.random() * Math.PI * 2 });
        }
        spawnPlayParticles(x, y, 3 + Math.floor(Math.random() * 5));
        lastInteraction = time;
      }
    }

    canvas.addEventListener('mousedown', (e) => {
      isDown = true;
      tearAccum = 0;
      const rect = canvas.getBoundingClientRect();
      handleTear(e.clientX - rect.left, e.clientY - rect.top);
    });

    canvas.addEventListener('mousemove', (e) => {
      if (!isDown) return;
      const rect = canvas.getBoundingClientRect();
      handleDrag(e.clientX - rect.left, e.clientY - rect.top);
    });

    canvas.addEventListener('mouseup', () => { isDown = false; });
    canvas.addEventListener('mouseleave', () => { isDown = false; });

    canvas.addEventListener('touchstart', (e) => {
      e.preventDefault();
      isDown = true;
      tearAccum = 0;
      const rect = canvas.getBoundingClientRect();
      const t = e.touches[0];
      handleTear(t.clientX - rect.left, t.clientY - rect.top);
    }, { passive: false });

    canvas.addEventListener('touchmove', (e) => {
      e.preventDefault();
      if (!isDown) return;
      const rect = canvas.getBoundingClientRect();
      const t = e.touches[0];
      handleDrag(t.clientX - rect.left, t.clientY - rect.top);
    }, { passive: false });

    canvas.addEventListener('touchend', () => { isDown = false; });

    window.addEventListener('resize', resize);
    resize();
    requestAnimationFrame(frame);
  })();
  </script>
</body>
</html>
