<head>

  <style>
    :root {
      --bg: #020210;
      --text: #8a90b0;
      --dim: #3a3a58;
      --wrong: #c4973a;
      --right: #4a7a9a;
      --font: 'Georgia', 'Times New Roman', serif;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      user-select: none;
      -webkit-user-select: none;
    }
    nav {
      width: 100%;
      padding: 0.75rem 1.5rem;
      display: flex;
      gap: 1.25rem;
      font-size: 0.8rem;
      border-bottom: 1px solid rgba(50, 50, 80, 0.2);
      z-index: 10;
      position: relative;
    }
    nav a { color: var(--dim); text-decoration: none; transition: color 0.3s; }
    nav a:hover { color: var(--text); }

    .canvas-wrap {
      flex: 1;
      position: relative;
      cursor: default;
    }
    canvas {
      display: block;
      width: 100%;
      height: 100%;
    }

    .overlay {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      padding: 1rem 1.5rem;
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      pointer-events: none;
      z-index: 5;
    }
    .info { pointer-events: auto; }
    .adapt-level {
      font-size: 0.75rem;
      color: var(--dim);
      font-variant-numeric: tabular-nums;
      transition: color 1s ease;
    }
    .adapt-bar {
      width: 100px;
      height: 2px;
      background: rgba(50, 50, 80, 0.25);
      border-radius: 1px;
      margin-top: 4px;
      overflow: hidden;
    }
    .adapt-fill {
      height: 100%;
      background: var(--dim);
      border-radius: 1px;
      transition: background 1s ease;
    }
    .mode-label {
      font-size: 0.6rem;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      color: var(--dim);
      margin-top: 3px;
      transition: color 1.5s ease;
    }
    .right-info {
      text-align: right;
      pointer-events: auto;
    }
    .hint {
      font-size: 0.7rem;
      color: var(--dim);
      opacity: 0;
      transition: opacity 2s ease;
      font-style: italic;
    }
    .hint.visible { opacity: 1; }
    .flashlight-label {
      font-size: 0.6rem;
      color: var(--dim);
      opacity: 0;
      transition: opacity 1s ease;
      margin-top: 3px;
    }
    .flashlight-label.visible { opacity: 0.7; }

    .quote-overlay {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 20;
      pointer-events: none;
      opacity: 0;
      transition: opacity 5s ease;
    }
    .quote-overlay.visible { opacity: 1; }
    .quote-text {
      font-size: clamp(0.85rem, 2.2vw, 1.3rem);
      color: #5a8aaa;
      font-style: italic;
      letter-spacing: 0.02em;
      text-align: center;
      max-width: 520px;
      line-height: 1.8;
    }

    @media (max-width: 600px) {
      nav { padding: 0.5rem 1rem; gap: 0.75rem; font-size: 0.7rem; }
      .overlay { padding: 0.75rem 1rem; }
    }
  </style>

<body>
  <nav>
    <a href="/">Kira Omanyte</a>
    <a href="/art.html">Art</a>
    <a href="/guide.html">Start Here</a>
    <a href="/feed.xml">RSS</a>
  </nav>

  <div class="canvas-wrap" id="wrap">
    <canvas id="c"></canvas>
    <div class="overlay">
      <div class="info">
        <div class="adapt-level" id="adaptLevel">0%</div>
        <div class="adapt-bar">
          <div class="adapt-fill" id="adaptBar" style="width: 0%"></div>
        </div>
        <div class="mode-label" id="modeLabel">photopic</div>
      </div>
      <div class="right-info">
        <div class="hint" id="hint"></div>
        <div class="flashlight-label" id="flashLabel">flashlight: off</div>
      </div>
    </div>
    <div class="quote-overlay" id="quote">
      <div class="quote-text">The darkness was never empty.<br>You were adapted to the light.</div>
    </div>
  </div>

<script>
(() => {
  // ========================================
  // The Dark Measure — Art Piece #29
  // Kira Omanyte, 2026
  //
  // Darkness is not the absence of light.
  // It is a measurement system.
  // ========================================

  const canvas = document.getElementById('c');
  const ctx = canvas.getContext('2d');
  const adaptLevelEl = document.getElementById('adaptLevel');
  const adaptBarEl = document.getElementById('adaptBar');
  const modeLabelEl = document.getElementById('modeLabel');
  const hintEl = document.getElementById('hint');
  const flashLabelEl = document.getElementById('flashLabel');
  const quoteEl = document.getElementById('quote');

  let W, H, dpr;

  // --- Configuration ---
  const FULL_ADAPT_TIME = 120;     // seconds to full scotopic
  const DEADAPT_RATE = 2.5;        // flashlight de-adaptation multiplier
  const FLASHLIGHT_RADIUS = 110;
  const DOT_COUNT = 350;
  const PARTICLE_COUNT = 180;
  const PULSE_COUNT = 5;
  const CONNECTION_DIST = 45;

  // --- State ---
  let adaptation = 0;
  let flashlightOn = false;
  let mouseX = -999, mouseY = -999;
  let elapsed = 0;
  let quoteShown = false;
  let hintPhase = 0;

  // --- Elements ---

  // The six naming corrections — the philosophical core
  const namingPairs = [
    { wrong: 'Photoperiodism',  right: 'Scotoperiodism',       xr: 0.20, yr: 0.20 },
    { wrong: 'Sleep hormone',   right: 'Darkness hormone',     xr: 0.80, yr: 0.17 },
    { wrong: 'Visual cortex',   right: 'Spatial cortex',       xr: 0.14, yr: 0.58 },
    { wrong: 'Short-day plant', right: 'Long-night plant',     xr: 0.85, yr: 0.50 },
    { wrong: 'Insomnia',        right: 'Dorveille',            xr: 0.28, yr: 0.80 },
    { wrong: 'Light pollution', right: 'Darkness destruction',  xr: 0.72, yr: 0.76 },
  ];

  let dots = [];
  let particles = [];
  let pulses = [];
  let connections = [];

  // --- Init ---

  function resize() {
    dpr = window.devicePixelRatio || 1;
    const wrap = canvas.parentElement;
    W = wrap.clientWidth;
    H = wrap.clientHeight;
    canvas.width = W * dpr;
    canvas.height = H * dpr;
    canvas.style.width = W + 'px';
    canvas.style.height = H + 'px';
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  }

  function initElements() {
    // Hidden dots — the ecology of darkness
    dots = [];
    for (let i = 0; i < DOT_COUNT; i++) {
      // Mix of uniform and center-biased distribution
      let x, y;
      if (i < DOT_COUNT * 0.3) {
        // Center cluster (the phytochrome region)
        const angle = Math.random() * Math.PI * 2;
        const r = Math.random() * Math.min(W, H) * 0.25;
        x = W / 2 + Math.cos(angle) * r;
        y = H / 2 + Math.sin(angle) * r;
      } else {
        x = Math.random() * W;
        y = Math.random() * H;
      }

      dots.push({
        x, y,
        threshold: 0.03 + Math.random() * 0.92,
        size: 0.3 + Math.random() * 2.2,
        twinklePhase: Math.random() * Math.PI * 2,
        twinkleSpeed: Math.random() * 0.4 + 0.15,
        hue: 195 + Math.random() * 65, // blue to purple
        sat: 25 + Math.random() * 25,
      });
    }

    // Flowing particles — biological signaling
    particles = [];
    for (let i = 0; i < PARTICLE_COUNT; i++) {
      particles.push(newParticle());
    }

    // Pulsing circles — circadian rhythms
    pulses = [];
    for (let i = 0; i < PULSE_COUNT; i++) {
      pulses.push({
        x: 0.15 + Math.random() * 0.7,
        y: 0.15 + Math.random() * 0.7,
        baseRadius: 18 + Math.random() * 45,
        pulseSpeed: 0.2 + Math.random() * 0.6,
        phase: Math.random() * Math.PI * 2,
        threshold: 0.35 + Math.random() * 0.35,
      });
    }

    // Pre-compute connections
    connections = [];
    for (let i = 0; i < dots.length; i++) {
      for (let j = i + 1; j < dots.length; j++) {
        const dx = dots[i].x - dots[j].x;
        const dy = dots[i].y - dots[j].y;
        const distSq = dx * dx + dy * dy;
        if (distSq < CONNECTION_DIST * CONNECTION_DIST) {
          connections.push({
            i, j,
            dist: Math.sqrt(distSq),
            threshold: Math.max(dots[i].threshold, dots[j].threshold, 0.6),
          });
        }
      }
    }
  }

  function newParticle() {
    return {
      x: Math.random() * W,
      y: Math.random() * H,
      angle: Math.random() * Math.PI * 2,
      speed: 0.08 + Math.random() * 0.35,
      threshold: 0.15 + Math.random() * 0.7,
      size: 0.4 + Math.random() * 1.4,
      life: Math.random() * 500,
      maxLife: 250 + Math.random() * 500,
      drift: (Math.random() - 0.5) * 0.008,
      hue: 170 + Math.random() * 50,
    };
  }

  // --- Flashlight ---

  function flashIntensity(x, y) {
    if (!flashlightOn) return 0;
    const dx = x - mouseX;
    const dy = y - mouseY;
    const dist = Math.sqrt(dx * dx + dy * dy);
    if (dist > FLASHLIGHT_RADIUS) return 0;
    const t = dist / FLASHLIGHT_RADIUS;
    return (1 - t * t) * (1 - t * t); // smooth falloff
  }

  // --- Drawing ---

  function drawDots(t) {
    for (const dot of dots) {
      const flash = flashIntensity(dot.x, dot.y);

      // Adapted visibility
      let vis = 0;
      if (adaptation >= dot.threshold) {
        vis = Math.min(1, (adaptation - dot.threshold) / 0.12);
      }

      if (vis < 0.01 && flash < 0.01) continue;

      // Twinkle
      const twinkle = Math.sin(t * 0.001 * dot.twinkleSpeed + dot.twinklePhase) * 0.12 + 0.88;

      // Adapted vision: cool blue-purple
      if (vis > 0.01) {
        const a = vis * twinkle * 0.55;
        ctx.beginPath();
        ctx.arc(dot.x, dot.y, dot.size, 0, Math.PI * 2);
        ctx.fillStyle = `hsla(${dot.hue}, ${dot.sat}%, 52%, ${a})`;
        ctx.fill();

        // Glow on larger dots
        if (dot.size > 1.6 && vis > 0.4) {
          ctx.beginPath();
          ctx.arc(dot.x, dot.y, dot.size * 4, 0, Math.PI * 2);
          ctx.fillStyle = `hsla(${dot.hue}, ${dot.sat - 5}%, 48%, ${a * 0.05})`;
          ctx.fill();
        }
      }

      // Flashlight: warm amber reveal
      if (flash > 0.01) {
        const a = flash * 0.45;
        ctx.beginPath();
        ctx.arc(dot.x, dot.y, dot.size * 0.7, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(196, 151, 58, ${a})`;
        ctx.fill();
      }
    }
  }

  function drawParticles(t) {
    for (const p of particles) {
      p.life++;
      if (p.life > p.maxLife) {
        Object.assign(p, newParticle());
        p.life = 0;
      }

      // Gentle drifting motion
      p.angle += p.drift + Math.sin(t * 0.00025 + p.x * 0.004) * 0.004;
      p.x += Math.cos(p.angle) * p.speed;
      p.y += Math.sin(p.angle) * p.speed;

      // Wrap
      if (p.x < -10) p.x += W + 20;
      if (p.x > W + 10) p.x -= W + 20;
      if (p.y < -10) p.y += H + 20;
      if (p.y > H + 10) p.y -= H + 20;

      const flash = flashIntensity(p.x, p.y);

      let vis = 0;
      if (adaptation >= p.threshold) {
        vis = Math.min(1, (adaptation - p.threshold) / 0.12);
      }

      if (vis < 0.01 && flash < 0.01) continue;

      // Life fade
      const lifeFade = Math.min(1, p.life / 35) * Math.min(1, (p.maxLife - p.life) / 35);

      if (vis > 0.01) {
        const a = vis * lifeFade * 0.4;
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
        ctx.fillStyle = `hsla(${p.hue}, 30%, 45%, ${a})`;
        ctx.fill();
      }

      if (flash > 0.01) {
        const a = flash * lifeFade * 0.35;
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.size * 0.6, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(196, 151, 58, ${a})`;
        ctx.fill();
      }
    }
  }

  function drawPulses(t) {
    for (const p of pulses) {
      const px = p.x * W;
      const py = p.y * H;

      let vis = 0;
      if (adaptation >= p.threshold) {
        vis = Math.min(1, (adaptation - p.threshold) / 0.18);
      }

      const flash = flashIntensity(px, py);
      if (vis < 0.01 && flash < 0.01) continue;

      const pulse = Math.sin(t * 0.001 * p.pulseSpeed + p.phase);
      const radius = p.baseRadius + pulse * p.baseRadius * 0.3;

      if (vis > 0.01) {
        ctx.beginPath();
        ctx.arc(px, py, radius, 0, Math.PI * 2);
        ctx.strokeStyle = `hsla(215, 28%, 38%, ${vis * 0.1})`;
        ctx.lineWidth = 1;
        ctx.stroke();

        // Inner pulse
        const innerR = radius * (0.25 + pulse * 0.05);
        ctx.beginPath();
        ctx.arc(px, py, innerR, 0, Math.PI * 2);
        ctx.fillStyle = `hsla(215, 28%, 42%, ${vis * 0.06})`;
        ctx.fill();
      }

      if (flash > 0.01) {
        ctx.beginPath();
        ctx.arc(px, py, radius * 0.5, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(180, 140, 50, ${flash * 0.06})`;
        ctx.fill();
      }
    }
  }

  function drawConnections() {
    if (adaptation < 0.55) return;
    const connVis = Math.min(1, (adaptation - 0.55) / 0.25);

    for (const c of connections) {
      if (adaptation < c.threshold) continue;
      const dotA = dots[c.i];
      const dotB = dots[c.j];
      const a = (1 - c.dist / CONNECTION_DIST) * connVis * 0.05;
      if (a < 0.003) continue;

      ctx.beginPath();
      ctx.moveTo(dotA.x, dotA.y);
      ctx.lineTo(dotB.x, dotB.y);
      ctx.strokeStyle = `hsla(215, 22%, 48%, ${a})`;
      ctx.lineWidth = 0.5;
      ctx.stroke();
    }
  }

  function drawPhytochromeTimer(t) {
    if (adaptation < 0.5) return;
    const vis = Math.min(1, (adaptation - 0.5) / 0.25);

    const cx = W / 2;
    const cy = H / 2;
    const radius = Math.min(W, H) * 0.04;

    // Timer fills over 18 seconds (Pfr→Pr reversion)
    const period = 18000;
    const progress = (t % period) / period;

    // Background ring
    ctx.beginPath();
    ctx.arc(cx, cy, radius, 0, Math.PI * 2);
    ctx.strokeStyle = `rgba(60, 68, 100, ${vis * 0.12})`;
    ctx.lineWidth = 1.5;
    ctx.stroke();

    // Fill arc
    ctx.beginPath();
    ctx.arc(cx, cy, radius, -Math.PI / 2, -Math.PI / 2 + progress * Math.PI * 2);
    ctx.strokeStyle = `rgba(74, 122, 154, ${vis * 0.25})`;
    ctx.lineWidth = 2;
    ctx.stroke();

    // Center dot
    ctx.beginPath();
    ctx.arc(cx, cy, 1.5, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(74, 122, 154, ${vis * 0.35})`;
    ctx.fill();

    // Label — Pfr → Pr (the phytochrome dark reversion)
    if (vis > 0.4) {
      const labelA = (vis - 0.4) / 0.6 * 0.35;
      const fontSize = Math.max(10, Math.min(W * 0.012, 13));
      ctx.font = `${fontSize}px Georgia, serif`;
      ctx.textAlign = 'center';
      ctx.fillStyle = `rgba(74, 122, 154, ${labelA})`;
      ctx.fillText('Pfr \u2192 Pr', cx, cy + radius + fontSize + 4);
    }
  }

  function drawNamingPairs(t) {
    const fontSize = Math.max(13, Math.min(W * 0.022, 19));
    ctx.textBaseline = 'middle';

    for (const pair of namingPairs) {
      const px = pair.xr * W;
      const py = pair.yr * H;
      const flash = flashIntensity(px, py);

      // Wrong name: visible when unadapted, fading with adaptation
      // Full at adaptation=0, gone by adaptation=0.6
      let wrongA = Math.max(0, 1 - adaptation / 0.55) * 0.55;
      // Flashlight brings wrong names back
      wrongA = Math.min(0.8, wrongA + flash * 0.55);

      // Right name: invisible when unadapted, appearing with adaptation
      // Invisible at adaptation<0.4, full by adaptation=1.0
      let rightA = Math.max(0, (adaptation - 0.4) / 0.6) * 0.6;
      // Flashlight suppresses right names
      rightA = Math.max(0, rightA - flash * 0.55);

      // Draw wrong name — warm amber (the color of artificial light)
      if (wrongA > 0.01) {
        ctx.font = `${fontSize}px Georgia, serif`;
        ctx.textAlign = 'center';
        ctx.fillStyle = `rgba(196, 151, 58, ${wrongA})`;
        ctx.fillText(pair.wrong, px, py);
      }

      // Draw right name — cool blue (the color of adapted vision)
      if (rightA > 0.01) {
        ctx.font = `italic ${fontSize}px Georgia, serif`;
        ctx.textAlign = 'center';
        ctx.fillStyle = `rgba(74, 122, 154, ${rightA})`;
        ctx.fillText(pair.right, px, py + fontSize * 1.4);
      }

      // Crossover line — thin mark during transition
      if (adaptation > 0.3 && adaptation < 0.65 && flash < 0.3) {
        const crossA = Math.max(0, 1 - Math.abs(adaptation - 0.47) * 5) * 0.1;
        if (crossA > 0.005) {
          const lineW = ctx.measureText(pair.wrong).width * 0.7;
          ctx.beginPath();
          ctx.moveTo(px - lineW / 2, py + fontSize * 0.65);
          ctx.lineTo(px + lineW / 2, py + fontSize * 0.65);
          ctx.strokeStyle = `rgba(100, 105, 140, ${crossA})`;
          ctx.lineWidth = 0.5;
          ctx.stroke();
        }
      }
    }
  }

  function drawFlashlight(t) {
    if (!flashlightOn) return;

    // Warm glow dome
    const gradient = ctx.createRadialGradient(
      mouseX, mouseY, 0,
      mouseX, mouseY, FLASHLIGHT_RADIUS
    );
    gradient.addColorStop(0, 'rgba(196, 151, 58, 0.035)');
    gradient.addColorStop(0.4, 'rgba(180, 140, 50, 0.018)');
    gradient.addColorStop(0.8, 'rgba(160, 130, 40, 0.005)');
    gradient.addColorStop(1, 'rgba(140, 120, 40, 0)');
    ctx.fillStyle = gradient;
    ctx.beginPath();
    ctx.arc(mouseX, mouseY, FLASHLIGHT_RADIUS, 0, Math.PI * 2);
    ctx.fill();

    // Bright center point
    const inner = ctx.createRadialGradient(
      mouseX, mouseY, 0,
      mouseX, mouseY, 6
    );
    inner.addColorStop(0, 'rgba(220, 180, 100, 0.12)');
    inner.addColorStop(1, 'rgba(200, 160, 80, 0)');
    ctx.fillStyle = inner;
    ctx.beginPath();
    ctx.arc(mouseX, mouseY, 8, 0, Math.PI * 2);
    ctx.fill();
  }

  // --- Adaptation ---

  function updateAdaptation(dt) {
    if (flashlightOn) {
      adaptation = Math.max(0, adaptation - (dt / FULL_ADAPT_TIME) * DEADAPT_RATE);
    } else {
      adaptation = Math.min(1, adaptation + dt / FULL_ADAPT_TIME);
    }

    // UI
    const pct = Math.round(adaptation * 100);
    adaptLevelEl.textContent = pct + '%';
    adaptBarEl.style.width = pct + '%';

    // Mode transitions
    if (adaptation < 0.33) {
      modeLabelEl.textContent = 'photopic';
      modeLabelEl.style.color = '#4a4a68';
      adaptBarEl.style.background = '#4a4a68';
      adaptLevelEl.style.color = '#4a4a68';
    } else if (adaptation < 0.67) {
      modeLabelEl.textContent = 'mesopic';
      modeLabelEl.style.color = '#4a6a88';
      adaptBarEl.style.background = '#4a6a88';
      adaptLevelEl.style.color = '#4a6a88';
    } else {
      modeLabelEl.textContent = 'scotopic';
      modeLabelEl.style.color = '#4a7a9a';
      adaptBarEl.style.background = '#4a7a9a';
      adaptLevelEl.style.color = '#4a7a9a';
    }
  }

  function updateHints() {
    // First hint after 4 seconds
    if (hintPhase === 0 && elapsed > 4) {
      hintPhase = 1;
      hintEl.textContent = 'stay in the dark';
      hintEl.classList.add('visible');
      setTimeout(() => {
        hintEl.classList.remove('visible');
      }, 5000);
    }

    // Second hint: flashlight instruction
    if (hintPhase === 1 && elapsed > 15 && adaptation > 0.1) {
      hintPhase = 2;
      setTimeout(() => {
        hintEl.textContent = 'click for flashlight — but it costs you';
        hintEl.classList.add('visible');
        flashLabelEl.classList.add('visible');
        setTimeout(() => hintEl.classList.remove('visible'), 6000);
      }, 1000);
    }

    // Quote at near-full adaptation
    if (!quoteShown && adaptation >= 0.92) {
      quoteShown = true;
      setTimeout(() => quoteEl.classList.add('visible'), 2500);
    }

    // Hide quote if adaptation drops significantly
    if (quoteShown && adaptation < 0.75) {
      quoteEl.classList.remove('visible');
      quoteShown = false;
    }
  }

  // --- Main Loop ---

  let lastTime = 0;

  function frame(timestamp) {
    const dt = Math.min(lastTime ? (timestamp - lastTime) / 1000 : 0.016, 0.1);
    lastTime = timestamp;
    elapsed += dt;

    updateAdaptation(dt);
    updateHints();

    // Clear
    ctx.fillStyle = '#020210';
    ctx.fillRect(0, 0, W, H);

    // Draw layers (back to front)
    drawConnections();
    drawPulses(timestamp);
    drawDots(timestamp);
    drawParticles(timestamp);
    drawPhytochromeTimer(timestamp);
    drawNamingPairs(timestamp);
    drawFlashlight(timestamp);

    requestAnimationFrame(frame);
  }

  // --- Input ---

  canvas.addEventListener('mousemove', (e) => {
    const rect = canvas.getBoundingClientRect();
    mouseX = e.clientX - rect.left;
    mouseY = e.clientY - rect.top;
  });

  canvas.addEventListener('click', () => {
    flashlightOn = !flashlightOn;
    canvas.style.cursor = flashlightOn ? 'none' : 'default';
    flashLabelEl.textContent = flashlightOn ? 'flashlight: on' : 'flashlight: off';
    if (flashLabelEl.classList.contains('visible') === false && hintPhase >= 2) {
      flashLabelEl.classList.add('visible');
    }
  });

  // Touch: hold = flashlight
  canvas.addEventListener('touchstart', (e) => {
    e.preventDefault();
    const touch = e.touches[0];
    const rect = canvas.getBoundingClientRect();
    mouseX = touch.clientX - rect.left;
    mouseY = touch.clientY - rect.top;
    flashlightOn = true;
    flashLabelEl.textContent = 'flashlight: on';
  });

  canvas.addEventListener('touchmove', (e) => {
    e.preventDefault();
    const touch = e.touches[0];
    const rect = canvas.getBoundingClientRect();
    mouseX = touch.clientX - rect.left;
    mouseY = touch.clientY - rect.top;
  }, { passive: false });

  canvas.addEventListener('touchend', () => {
    flashlightOn = false;
    flashLabelEl.textContent = 'flashlight: off';
  });

  // Keyboard
  document.addEventListener('keydown', (e) => {
    if (e.key === 'f' || e.key === 'F') {
      flashlightOn = !flashlightOn;
      canvas.style.cursor = flashlightOn ? 'none' : 'default';
      flashLabelEl.textContent = flashlightOn ? 'flashlight: on' : 'flashlight: off';
      if (!flashLabelEl.classList.contains('visible') && hintPhase >= 2) {
        flashLabelEl.classList.add('visible');
      }
    }
    // R to reset adaptation
    if (e.key === 'r' || e.key === 'R') {
      adaptation = 0;
      quoteShown = false;
      quoteEl.classList.remove('visible');
    }
  });

  // --- Init ---
  resize();
  initElements();
  window.addEventListener('resize', () => {
    resize();
    initElements();
  });
  requestAnimationFrame(frame);
})();
</script>
</body>
</html>
